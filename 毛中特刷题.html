tions":{"A":"中华文明的深厚渊源","B":"对实现中国发展目标条件的认知","C":"世界发展大势的把握","D":"中美关系影响下的国际关系格局"},"answer":"ABC"},{"type":"multi","qid":"M388","id":388,"question":"为什么说党的领导是中国特色社会主义最本质的特征（）","options":{"A":"党的领导直接关系着中国特色社会主义的性质、方向和命运。","B":"党的领导是实现社会主义现代化和民族振兴的最根本保证。","C":"党的领导是国家的根本政治制度","D":"党的领导是我国的根本的经济制度"},"answer":"AB"},{"type":"multi","qid":"M389","id":389,"question":"党的领导是中国特色社会主义制度的最大优势，是因为（）","options":{"A":"党的自身优势是中国特色社会主义制度优势的主要来源","B":"党的领导是我国社会主义市场经济制度的根本制度","C":"中国特色社会主义制度是党领导人民创建的。","D":"党的领导是充分发挥中国特色社会主义制度优势的根本保障。"},"answer":"ACD"},{"type":"multi","qid":"M390","id":390,"question":"新时代中国共产党的历史使命就是统揽（）在全面建成小康社会的基础上全面建设社会主义现代化国家，实现中华民族伟大复兴的中国梦。","options":{"A":"伟大斗争","B":"伟大工程","C":"伟大事业","D":"伟大梦想"},"answer":"ABCD"},{"type":"multi","qid":"M391","id":391,"question":"为什么说党是最高政治领导力量","options":{"A":"党是政治方向的引领者","B":"党是政治体系的统领者","C":"党是重大决策的决断者","D":"党是法律体系的制定者"},"answer":"ABCD"},{"type":"multi","qid":"M392","id":392,"question":"确保党始终总揽全局、协调各方，必须增强（）","options":{"A":"政治意识","B":"大局意识","C":"核心意识","D":"看齐意识"},"answer":"ABCD"},{"type":"multi","qid":"M393","id":393,"question":"确保党始终总揽全局、协调各方，必须全面增强党的执政本领，具体包括以下哪些本领（）","options":{"A":"学习本领","B":"政治领导本领","C":"改革创新本领","D":"群众工作本领"},"answer":"ABCD"},{"type":"multi","qid":"M394","id":394,"question":"中国特色社会主义是（）的辩证统一。","options":{"A":"文化","B":"道路","C":"理论","D":"制度"},"answer":"ABCD"},{"type":"multi","qid":"M395","id":395,"question":"坚定文化自信，就要（）","options":{"A":"传承中华优秀传统文化、革命文化","B":"发展社会主义先进文化","C":"推动中华优秀传统文化创造性转化、创新性发展","D":"建设社会主义文化强国"},"answer":"ABCD"},{"type":"multi","qid":"M396","id":396,"question":"中国共产党的执政地位是在长期革命斗争中逐步形成的，是近现代中国历史发展的必然，是人民拥护和选择的结果。坚持党的领导，是（）","options":{"A":"党和国家的根本所在、命脉所在","B":"全国各族人民的利益所系、幸福所系","C":"中国特色社会主义最本质的特征","D":"中国特色社会主义制度的最大优势"},"answer":"ABCD"},{"type":"multi","qid":"M397","id":397,"question":"中国共产党的执政地位是在长期革命斗争中逐步形成的，是近现代中国历史发展的必然，是人民拥护和选择的结果。中国共产党成立以后，团结带领中国人民（）","options":{"A":"完成新民主主义革命，建立了中华人民共和国","B":"完成社会主义革命，确立社会主义基本制度，推进了社会主义建设","C":"进行改革开放新的伟大革命，极大解放和发展了社会生产力","D":"完成了社会主义工业化"},"answer":"ABC"},{"type":"multi","qid":"M398","id":398,"question":"中国共产党的执政地位是在长期革命斗争中逐步形成的，是近现代中国历史发展的必然，是人民拥护和选择的结果。中国共产党领导中国人民取得的伟大胜利（）","options":{"A":"让中华文明在现代化进程中焕发出新的蓬勃生机","B":"让科学社会主义在21世纪焕发出新的蓬勃生机","C":"使具有5000多年文明历史的中华民族全面迈向现代化","D":"使中华民族焕发出新的蓬勃生机"},"answer":"ABCD"},{"type":"multi","qid":"M399","id":399,"question":"中国共产党的领导是中国特色社会主义最本质的特征，这是由（）","options":{"A":"科学社会主义的理论逻辑所决定的","B":"中国特色社会主义产生与发展的历史逻辑所决定的","C":"中国特色社会主义迈向新征程的实践逻辑所决定的","D":"中国共产党在世界政党中的地位和作用所决定的"},"answer":"ABC"},{"type":"multi","qid":"M400","id":400,"question":"日本众议院前议长河野洋平在《人民日报》发表的《符合国情的制度给中国人民带来好生活》的文章中说：“关于新中国成立70年发展变化的原因，不同的人有不同的解读。我认为，中国共产党的坚强领导发挥了不可替代的重要作用。中国共产党对中国发展作出了科学的顶层设计。”“在中国共产党制定的目标的指引下，十几亿中国人怀着’明天要比今天过得更好’的愿望，辛勤劳作，刻苦钻研，艰苦奋斗，朝着共同的目标努力，克服了一个又一个困难，推动国家面貌发生了巨大变化。”这是一段真知灼见。中国共产党的领导是中国特色社会主义制度的最大优势，这是因为（）","options":{"A":"中国特色社会主义制度是党领导人民创建的","B":"党的领导是充分发挥中国特色社会主义制度优势的根本保障","C":"党以自身优势引领和锻造了中国特色社会主义的制度优势","D":"党的自身优势保证了中国特色社会主义制度优势的有效发挥"},"answer":"ABCD"},{"type":"multi","qid":"M401","id":401,"question":"实现中华民族伟大复兴是近代以来中华民族最伟大的梦想。中华民族伟大复兴，绝不是轻轻松松、敲锣打鼓就能实现的。实现伟大梦想，必须（）","options":{"A":"进行伟大斗争","B":"提出伟大构想","C":"推进伟大工程","D":"推进伟大事业"},"answer":"ACD"},{"type":"multi","qid":"M402","id":402,"question":"党是最高政治领导力量，这是（）","options":{"A":"马克思主义政党学说的基本原则","B":"对党领导革命、建设和改革历史经验的深刻总结","C":"马克思主义政党的基本要求","D":"推进伟大事业的根本保证"},"answer":"ABCD"},{"type":"multi","qid":"M403","id":403,"question":"新时代中国共产党的历史使命，就是（）","options":{"A":"统揽伟大斗争、伟大工程、伟大事业、伟大梦想","B":"在全面建成小康社会的基础上全面建成社会主义现代化强国","C":"实现中华民族伟大复兴的中国梦","D":"敢于斗争、敢于胜利"},"answer":"ABC"},{"type":"multi","qid":"M404","id":404,"question":"古人说：“凡将立国，制度不可不察也。”制度优势是一个国家的最大优势，制度竞争是国家间最根本的竞争。制度稳则国家稳。新中国成立以来，中华民族之所以能迎来从站起来、富起来到强起来的伟大飞跃，最根本的是因为党领导人民建立和完善了中国特色社会主义制度，形成和发展了党的领导和经济、政治、文化、社会、生态文明、军事、外事等各方面制度，不断加强和完善国家治理。国家治理体系和治理能力是一个有机的整体，两者的关系，表述正确的是","options":{"A":"有了好的国家治理体系才能提高治理能力","B":"治理体系与治理能力两者相辅相成","C":"治理体系建设比治理能力建设更重要","D":"提高国家治理能力才能充分发挥国家治理体系的效能"},"answer":"ABD"},{"type":"multi","qid":"M405","id":405,"question":"在2021年新年贺词中，习近平主席充分肯定过去一年全面建成小康社会取得伟大历史性成就，决战脱贫攻坚取得决定性胜利，强调我们还要咬定青山不放松，脚踏实地加油干，努力绘就乡村振兴的壮美画卷，朝着共同富裕的目标稳步前行。以习近平同志为核心的党中央，把脱贫攻坚作为全面建成小康社会的标志性工程，是因为","options":{"A":"城乡发展不平衡、农村发展不充分仍是社会主要矛盾的集中体现","B":"全面建设社会主义现代化强国最艰巨最繁重的任务依然在农村","C":"实现中华民族伟大复兴，最广泛最深厚的基础依然在农村","D":"脱贫攻坚是确保国内大循环畅通、塑造我国在国际大循环中新优势的关键"},"answer":"ABC"},{"type":"multi","qid":"M406","id":406,"question":"习近平指出：“改革开放是前无古人的崭新事业，必须坚持正确的方法论，在不断实践探索中推进。”注重系统性、整体性、协同性是全面深化改革的内在要求，也是推进改革的重要方法。为此，需要做到","options":{"A":"坚持整体推进，讲求整体效果","B":"注重平均用力，保持齐头并进","C":"既抓主要矛盾，也抓主要方面","D":"厘清改革逻辑，打好“组合拳”"},"answer":"ACD"},{"type":"multi","qid":"M407","id":407,"question":"“十四五”时期我国进如入新发展阶段，国内外环境正在发生深刻复杂变化。世界经济面临诸多复杂挑战，我们决不能被逆风和回头浪所阻，要站在历史正确的一边，坚定不移全面扩大开放，推动建设开放型世界经济，推动构建人类命运共同体。促进更高水平对外开放，具体就是要做到","options":{"A":"更广领域扩大外资市场准入","B":"更大力度加强知识产权保护国际合作","C":"更大规模增加商品和服务出口","D":"更加有效实施国际宏观经济政策协调"},"answer":"ABD"},{"type":"multi","qid":"M408","id":408,"question":"深圳、浦东，在中国改革开放40多年的历程中，具有非常重要的意义：当前，中国正踏上全面建设社会主义现代化国家新征程。作为中国改本开放的排头兵和先辞队，浦东从一个农田遍布的不便之地，变成了一个高楼林立，功能完善、四通人达、全球水准的现代化国际城区，创造了开放发展的奇迹。我国采取一系列扩大开放的措施，是因为","options":{"A":"对外开放是我国的基本国策","B":"全面开放是实现国家繁荣富强的根本出路","C":"着力发展开放型经济，才能强化现代化经济体系的战略支撑","D":"以开放促改革、促发展是我国现代化建设不断取得新成就的重要法宝"},"answer":"ABD"},{"type":"multi","qid":"M409","id":409,"question":"当今世界正经历百年未有之大变局，我国正处于实现中华民族伟大复兴的关键时期。从221年开始，我国进入“十四五”时期，这是乘势而上开启全面建设社会主义现代化国家新征程、向第二个百年奋斗目标进军的第一个五年，在此基础上开启全面建设社会主义现代化国家新的伟大征程，赋予了“四个全面”战略布局新内涵，即","options":{"A":"全面建设社会主义现代化国家","B":"全面依法治国","C":"全面深化改革","D":"全面从严治党"},"answer":"ABCD"},{"type":"multi","qid":"M410","id":410,"question":"习近平指出：“鲜明提出坚持走中国特色社会主义法治道路、建设中国特色社会主义法治体系的重大论断，明确建设社会主义法治国家的性质、方向、道路、抓手，必将有力推进社会主义法治国家建设。”建设中国特色社会主义法治体系是我们党提出的具有原创性、时代性的概念和理论之一。建设中国特色社会主义法治体系要","options":{"A":"健全保证宪法全面实施的体制机制","B":"完善立法体制机制","C":"加强对法律实施的监督","D":"健全社会主义公平正义法治保障制度"},"answer":"ABCD"},{"type":"multi","qid":"M411","id":411,"question":"全面依法治国是国家治理领域的一场革命。中共十九届二中全会指出，宪法是国家的根本法，是治国安邦的总章程，是党和人民意志的集中体现。现行宪法在改革开放和社会主义现代化建设的历史进程中、在我们党治国理政实践中发挥了十分重要的作用。当前，维护宪法尊严和权威是","options":{"A":"中国特色社会主义制度最大的优势","B":"中国特色社会主义最本质的特征","C":"维护国家法制统一、尊严、权威的前提","D":"维护最广大人民根本利益、确保国家长治久安的重要保障"},"answer":"CD"},{"type":"multi","qid":"M412","id":412,"question":"习近平强军思想回答了（）的时代课题。","options":{"A":"新时代建设一支什么样的强大人民军队","B":"为什么建设一支强大人民军队","C":"怎样建设强大人民军队","D":"怎样建设一支人民军队"},"answer":"AC"},{"type":"multi","qid":"M413","id":413,"question":"党在新时代的强军目标是（）","options":{"A":"听党指挥","B":"能打胜仗","C":"作风优良","D":"军队现代化"},"answer":"ABC"},{"type":"multi","qid":"M414","id":414,"question":"下列属于党对军队绝对领导的制度有（）","options":{"A":"坚持军队最高领导权和指挥权属于党中央、中央军委","B":"实行党委制、政治委员制、政治机关制","C":"实行党委统一的集体领导下的首长分工负责制","D":"实行支部建在连上"},"answer":"ABCD"},{"type":"multi","qid":"M415","id":415,"question":"构建一体化的国家战略体系和能力，必须着重把握几对关系，包括（），逐步实现国家各领域战略布局一体融合、战略资源一体整合、战略力量一体运用。","options":{"A":"富国和强军两大目标","B":"统筹发展和安全两件大事","C":"统筹国防和军队两种力量","D":"统合经济和国防两种实力"},"answer":"ABD"},{"type":"multi","qid":"M416","id":416,"question":"坚持走中国特色国家安全道路，必须坚持（）和（）两件大事。","options":{"A":"国家安全","B":"统筹发展","C":"安全","D":"人民幸福"},"answer":"BC"},{"type":"multi","qid":"M417","id":417,"question":"坚持总体国家安全观的重要意义包括（）。","options":{"A":"揭示了中国特色的国家安全道路","B":"回应了人民对国家安全的新期待","C":"适应了进行具有许多新的历史特点的伟大斗争的新要求","D":"顺应了世界发展变化的新趋势"},"answer":"BCD"},{"type":"multi","qid":"M418","id":418,"question":"国家安全必须把握好（）、（）、（）的有机统一。","options":{"A":"人民安全","B":"人民幸福","C":"政治安全","D":"国家利益"},"answer":"ACD"},{"type":"multi","qid":"M419","id":419,"question":"军民融合深度发展的格局特点是（）","options":{"A":"全要素","B":"多领域","C":"高效益","D":"能融则融"},"answer":"ABC"}],"j":[{"type":"judge","qid":"J1","id":1,"question":"实事求是内在地包含一切从实际出发、理论联系实际、在实践中检验真理和发展真理的内容。（     ）","answer":"对"},{"type":"judge","qid":"J2","id":2,"question":"解放思想作为党的思想路线，它始终是马克思主义中国化理论成果的精髓和灵魂。（     ）","answer":"错"},{"type":"judge","qid":"J3","id":3,"question":"我们讲一切从实际出发，其中最大的实际就是我国目前处于并将长期处于社会主义初级阶段。（     ）","answer":"对"},{"type":"judge","qid":"J4","id":4,"question":"经过党的六届六中全会，实事求是的思想路线在全党得到了确立。（     ）","answer":"错"},{"type":"judge","qid":"J5","id":5,"question":"马克思主义中国化的实质是马克思主义基本原理同中国传统文化相结合。（     ）","answer":"错"},{"type":"judge","qid":"J6","id":6,"question":"马克思恩格斯创立的马克思主义是我们全党全国各族人民团结奋斗的共同的思想基础。（     ）","answer":"错"},{"type":"judge","qid":"J7","id":7,"question":"邓小平在重新确立实事求是思想路线的过程中，特别强调解放思想的重要性。（     ）","answer":"对"},{"type":"judge","qid":"J8","id":8,"question":"实事求是是渗透于马克思主义中国化两大理论成果的方法论原则。（     ）","answer":"对"},{"type":"judge","qid":"J9","id":9,"question":"调查研究是从实际出发的中心一环，没有调查就没有发言权和决策权。（     ）","answer":"对"},{"type":"judge","qid":"J10","id":10,"question":"中国现在GDP总量位居世界第二，已经走出了社会主义初级阶段，正在建设发达社会主义。（     ）","answer":"错"},{"type":"judge","qid":"J11","id":11,"question":"马克思主义中国化就是在运用马克思主义解决中国实际问题的过程中，不断赋予马克思主义以鲜明的中国特色。（     ）","answer":"对"},{"type":"judge","qid":"J12","id":12,"question":"思想路线，亦称认识路线，指的是人们的认识所遵循的方向、途径、原则和方法。一个政党的思想路线，是指这个政党确定自己的指导思想并支配自己行动的认识路线。（     ）","answer":"对"},{"type":"judge","qid":"J13","id":13,"question":"中国民族文化的根基是中国固有的文化传统，马克思主义是一种外来思想文化，不适合中国，以马克思主义为指导就是西化。（     ）","answer":"错"},{"type":"judge","qid":"J14","id":14,"question":"1997年，党的十五大正式使用“邓小平理论”概念，并将其作为党的指导思想写入党章。（     ）","answer":"对"},{"type":"judge","qid":"J15","id":15,"question":"中国特色社会主义理论体系是马克思主义中国化最新成果，总体上属于马克思主义基本原理同中国具体实际相结合的第三次历史性飞跃的理论成果。（     ）","answer":"错"},{"type":"judge","qid":"J16","id":16,"question":"实现中华民族伟大复兴，这是中华民族近代以来最伟大的梦想。（     ）","answer":"对"},{"type":"judge","qid":"J17","id":17,"question":"马克思主义“不是教条，而是进一步研究的出发点和供这种研究使用的方法”，只有与本国国情相结合、与时代发展同进步，才能焕发出强大的生命力、创造力、感召力。（     ）","answer":"对"},{"type":"judge","qid":"J18","id":18,"question":"中国特色社会主义理论体系是能够把全国各族人民紧密团结在一起的共同思想基础，是我们战胜一切风险和挑战的主心骨。（     ）","answer":"对"},{"type":"judge","qid":"J19","id":19,"question":"在当代中国，坚持中国特色社会主义理论体系，就是真正坚持马克思列宁主义、毛泽东思想。（     ）","answer":"对"},{"type":"judge","qid":"J20","id":20,"question":"马克思主义中国化的第二个重大理论成果是毛泽东思想。（     ）","answer":"错"},{"type":"judge","qid":"J21","id":21,"question":"要坚持把马克思主义基本原理同中国具体实际相结合，不断推进马克思主义中国化，用发展着的马克思主义指导新的实践。（     ）","answer":"对"},{"type":"judge","qid":"J22","id":22,"question":"中国共产党领导的革命和建设的实践，是毛泽东思想形成的实践基础。（     ）","answer":"对"},{"type":"judge","qid":"J23","id":23,"question":"中国共产党从成立之日起，就把马克思列宁主义确定为指导思想，从此中国革命面临的一切问题就都有了现成答案，迎刃而解了。（     ）","answer":"错"},{"type":"judge","qid":"J24","id":24,"question":"把经济建设搞上去和建立强大的国防是我国现代化建设的两大战略任务，要坚持国防建设和经济建设协调发展的方针。（     ）","answer":"对"},{"type":"judge","qid":"J25","id":25,"question":"实事求是是党的思想路线的核心，也是中国特色社会主义理论体系的精髓。（     ）","answer":"对"},{"type":"judge","qid":"J26","id":26,"question":"在党的七大上，毛泽东代表党中央所作的《关于修改党章》的报告中，对“马克思主义中国化”从理论上作了进一步的阐述。（     ）","answer":"错"},{"type":"judge","qid":"J27","id":27,"question":"毛泽东思想是中国特色社会主义理论体系的重要思想渊源。（     ）","answer":"对"},{"type":"judge","qid":"J28","id":28,"question":"毛泽东指出，理论和实践相结合的作风，和人民群众紧密地联系在一起的作风，以及自我批评的作风，是中国共产党区别于其他政党的显著标志。（     ）","answer":"对"},{"type":"judge","qid":"J29","id":29,"question":"1982年，邓小平在党的十三大上提出了“建设有中国特色的社会主义”的重大命题。（     ）","answer":"错"},{"type":"judge","qid":"J30","id":30,"question":"全面深化改革、全面依法治国如鸟之两翼、车之双轮，推动着全面建成小康社会目标的实现。（     ）","answer":"对"},{"type":"judge","qid":"J31","id":31,"question":"人民民主专政理论是毛泽东思想关于社会主义经济建设理论的重要内容。（     ）","answer":"错"},{"type":"judge","qid":"J32","id":32,"question":"20世纪中国社会的第一次历史性巨变是辛亥革命。（     ）","answer":"对"},{"type":"judge","qid":"J33","id":33,"question":"“农村包围城市,武装夺取政权”道路理论的提出是毛泽东思想成熟的重要标志。（     ）","answer":"错"},{"type":"judge","qid":"J34","id":34,"question":"毛泽东思想的科学涵义作出完整概括的是刘少奇在中共七大所作的修改党章的报告。（     ）","answer":"对"},{"type":"judge","qid":"J35","id":35,"question":"党的思想建设的根本任务是克服主观主义、保持优良作风。（     ）","answer":"错"},{"type":"judge","qid":"J36","id":36,"question":"新民主主义共和国属无产阶级专政的社会主义国家。（     ）","answer":"错"},{"type":"judge","qid":"J37","id":37,"question":"毛泽东晚年犯了错误，因此毛泽东思想并不全都是对的。（     ）","answer":"错"},{"type":"judge","qid":"J38","id":38,"question":"新旧民主革命的根本区别在于革命任务不同。（     ）","answer":"错"},{"type":"judge","qid":"J39","id":39,"question":"五四运动标志着中国新民主主义革命的开端。（     ）","answer":"对"},{"type":"judge","qid":"J40","id":40,"question":"工农武装割据的中心内容是土地革命。（     ）","answer":"对"},{"type":"judge","qid":"J41","id":41,"question":"人民军队的惟一宗旨是坚持党对军队的绝对领导。（     ）","answer":"错"},{"type":"judge","qid":"J42","id":42,"question":"对民族资本主义采取保护政策，这是新民主主义济纲领中极具特色的一项内容。（     ）","answer":"对"},{"type":"judge","qid":"J43","id":43,"question":"在中国，没收官僚资本具有新民主主义革命和社会主义革命的双重性质。（     ）","answer":"对"},{"type":"judge","qid":"J44","id":44,"question":"土地革命时期标志着中国革命重心由城市转向农村的事件是八七会议。（     ）","answer":"错"},{"type":"judge","qid":"J45","id":45,"question":"革命统一战线的最根本问题是领导权问题。（     ）","answer":"对"},{"type":"judge","qid":"J46","id":46,"question":"新民主主义革命理论的完整论述是毛泽东思想达到成熟的重要标志。（     ）","answer":"对"},{"type":"judge","qid":"J47","id":47,"question":"新民主主义革命的主要任务是反帝反封建。（     ）","answer":"对"},{"type":"judge","qid":"J48","id":48,"question":"毛泽东思想基本形成的标志是“农村包围城市,武装夺取政权”道路理论的提出。（     ）","answer":"对"},{"type":"judge","qid":"J49","id":49,"question":"毛泽东思想成熟于土地革命战争时期。（     ）","answer":"错"},{"type":"judge","qid":"J50","id":50,"question":"新民主主义革命的前途是社会主义。（     ）","answer":"对"},{"type":"judge","qid":"J51","id":51,"question":"毛泽东思想最直接的理论来源是马列主义。（     ）","answer":"对"},{"type":"judge","qid":"J52","id":52,"question":"毛泽东的《论人民民主专政》一文，全面阐述新中国的国家政权理论。（     ）","answer":"对"},{"type":"judge","qid":"J53","id":53,"question":"毛泽东思想是一个完整的科学体系，其中也包括毛泽东晚年的全部思想。（     ）","answer":"错"},{"type":"judge","qid":"J54","id":54,"question":"毛泽东思想的活的灵魂的内容是实事求是、群众路线和自力更生。（     ）","answer":"错"},{"type":"judge","qid":"J55","id":55,"question":"共产党第一篇反教条主义的文献是《反对本本主义》。（     ）","answer":"对"},{"type":"judge","qid":"J56","id":56,"question":"《中国革命和中国共产党》一文是标志毛泽东思想形成的代表作之一。（     ）","answer":"错"},{"type":"judge","qid":"J57","id":57,"question":"毛泽东思想的主要创立者是毛泽东，因而毛泽东思想就是毛泽东个人的思想。（     ）","answer":"错"},{"type":"judge","qid":"J58","id":58,"question":"毛泽东思想被确立为党的指导思想是在中共六大上。（     ）","answer":"错"},{"type":"judge","qid":"J59","id":59,"question":"毛泽东思想萌芽于中国共产党的成立和国民革命时期。（     ）","answer":"对"},{"type":"judge","qid":"J60","id":60,"question":"中国共产党的历史上第一次提出毛泽东思想这个科学概念的是王稼祥。（     ）","answer":"对"},{"type":"judge","qid":"J61","id":61,"question":"民族资产阶级是新民主主义革命的动力，可以充当革命的主要力量。（     ）","answer":"错"},{"type":"judge","qid":"J62","id":62,"question":"在新民主主义革命时期，只有当民族资产阶级拥护革命时，才要保护民族资本主义。（     ）","answer":"错"},{"type":"judge","qid":"J63","id":63,"question":"毛泽东最早论述中国革命新道路理论的文章是《星星之火，可以燎原》。（     ）","answer":"错"},{"type":"judge","qid":"J64","id":64,"question":"中国革命必须以长期的武装斗争为唯一斗争形式。（     ）","answer":"错"},{"type":"judge","qid":"J65","id":65,"question":"民主革命时期，中国共产党党员的绝大多数来自农民，因而它不是工人阶级先锋队。（     ）","answer":"错"},{"type":"judge","qid":"J66","id":66,"question":"农民问题是中国革命的中心问题，因此，农民是中国革命的天然领导者。（     ）","answer":"错"},{"type":"judge","qid":"J67","id":67,"question":"社会主义改造属于社会主义革命性质。（   ）","answer":"对"},{"type":"judge","qid":"J68","id":68,"question":"我国社会主义改造全面展开是从1949年开始的。（   ）","answer":"错"},{"type":"judge","qid":"J69","id":69,"question":"社会主义改造的实践证明，中国可以在没有实现工业化的情况下进入社会主义。（   ）","answer":"对"},{"type":"judge","qid":"J70","id":70,"question":"社会主义改造完成后，国内主要的经济成分是集体所有制和全民所有制。（   ）","answer":"对"},{"type":"judge","qid":"J71","id":71,"question":"民族资产阶级经过社会主义改造，变成自食其力的劳动者。（   ）","answer":"对"},{"type":"judge","qid":"J72","id":72,"question":"手工业在社会主义改造前是合作社经济。（   ）","answer":"错"},{"type":"judge","qid":"J73","id":73,"question":"新中国成立之初，社会主义因素已居于领导地位。（   ）","answer":"对"},{"type":"judge","qid":"J74","id":74,"question":"民族资产阶级在新民主主义革命时期具有两面性，在社会主义革命阶段则不具备两面性。（   ）","answer":"错"},{"type":"judge","qid":"J75","id":75,"question":"资本主义工商业公私合营的出现代表着我国社会主义经济制度建立。（   ）","answer":"错"},{"type":"judge","qid":"J76","id":76,"question":"“一化三改”中“一化”是主体，即实现农业现代化。（   ）","answer":"错"},{"type":"judge","qid":"J77","id":77,"question":"中华人民共和国的成立，实现了从新民主主义社会向社会主义社会的转变。（   ）","answer":"错"},{"type":"judge","qid":"J78","id":78,"question":"农业在社会主义改造前不属于社会主义性质的经济成分。（   ）","answer":"对"},{"type":"judge","qid":"J79","id":79,"question":"新民主主义社会是一个独立的社会形态。（   ）","answer":"错"},{"type":"judge","qid":"J80","id":80,"question":"社会主义改造的完成，使我国的经济结构发生了根本变化。（   ）","answer":"对"},{"type":"judge","qid":"J81","id":81,"question":"1949年到1952年，中国社会的主要矛盾是工人阶级和民族资产阶级的矛盾。（   ）","answer":"错"},{"type":"judge","qid":"J82","id":82,"question":"区分新民主主义革命和旧新民主主义革命的标志是领导权问题。（）","answer":"对"},{"type":"judge","qid":"J83","id":83,"question":"新中国成立后的第一个“五年计划”起始于1949年。（    ）","answer":"错"},{"type":"judge","qid":"J84","id":84,"question":"建设社会主义，必须在平等的基础上开展同一切国家的经济技术交流。（  ）","answer":"对"},{"type":"judge","qid":"J85","id":85,"question":"无产阶级政党在执政之后，必须认真坚持民主集中制和集体领导原则。（   ）","answer":"对"},{"type":"judge","qid":"J86","id":86,"question":"50-60年代社会主义建设道路的初步探索的成功经验表明，社会主义并不需要很长时间就能获得巨大发展，从而开始向共产主义过渡。（  ）","answer":"错"},{"type":"judge","qid":"J87","id":87,"question":"社会主义建设没有固定不变的模式，各个国家应该根据自己的国情，独立自主地选择适合自己的发展道路。（ ）","answer":"对"},{"type":"judge","qid":"J88","id":88,"question":"社会主义社会的基本矛盾是对抗性的。（  ）","answer":"错"},{"type":"judge","qid":"J89","id":89,"question":"改革开放的成功经验证明，改革以前三十年的一切都是错误的。（ ）","answer":"错"},{"type":"judge","qid":"J90","id":90,"question":"解决各民族人民之间的矛盾，要实行民族平等、团结互助的方针。（   ）","answer":"对"},{"type":"judge","qid":"J91","id":91,"question":"20世纪50-60年代，社会主义建设道路的艰难探索表明，我国的社会主义制度搞早了。（ ）","answer":"错"},{"type":"judge","qid":"J92","id":92,"question":"人民内部矛盾是人民根本利益一致的基础上的矛盾。（   ）","answer":"对"},{"type":"judge","qid":"J93","id":93,"question":"社会主义建设的积极因素与消极因素在一定条件下是可以互相转化的。（   ）","answer":"错"},{"type":"judge","qid":"J94","id":94,"question":"解决人民群众和政府机关之间的矛盾，必须坚持民主集中制原则，努力克服政府机关的官僚主义，同时，加强对群众的思想教育。（  ）","answer":"对"},{"type":"judge","qid":"J95","id":95,"question":"20世纪50年代，毛泽东强调调动一切积极因素为社会主义事业服务，是党关于建设社会主义的一个极为重要的方针。（    ）","answer":"对"},{"type":"judge","qid":"J96","id":96,"question":"历史的经验教训告诉我们，关起门来搞建设是不行的，发展不起来。（    ）","answer":"对"},{"type":"judge","qid":"J97","id":97,"question":"只有在不断总结经验的基础上，才能逐步掌握社会主义建设的客观规律。（    ）","answer":"对"},{"type":"judge","qid":"J98","id":98,"question":"和平与发展成为时代主题是邓小平理论形成的时代背景。（   ）","answer":"对"},{"type":"judge","qid":"J99","id":99,"question":"解放思想作为党的思想路线，它始终是马克思主义中国化理论成果的精髓和灵魂。（   ）","answer":"错"},{"type":"judge","qid":"J100","id":100,"question":"我们讲一切从实际出发，其中最大的实际就是我国目前处于并将长期处于社会主义初级阶段。（   ）","answer":"对"},{"type":"judge","qid":"J101","id":101,"question":"改革开放是强国之路，是党和国家发展进步的活力源泉。（   ）","answer":"对"},{"type":"judge","qid":"J102","id":102,"question":"四项基本原则是立国之本，是党和国家生存发展的政治基石。（   ）","answer":"对"},{"type":"judge","qid":"J103","id":103,"question":"实现社会主义现代化奋斗目标的领导力量和依靠力量是人民群众。（    ）","answer":"错"},{"type":"judge","qid":"J104","id":104,"question":"邓小平在重新确立实事求是思想路线的过程中，特别强调解放思想的重要性。（   ）","answer":"对"},{"type":"judge","qid":"J105","id":105,"question":"邓小平同志留给我们的最重要的思想和政治遗产，就是他带领党和人民开创的中国特色社会主义。（   ）","answer":"对"},{"type":"judge","qid":"J106","id":106,"question":"我国已是社会主义社会，就凭这一点，就是我们党制定现阶段基本路线和基本纲领的基本依据。（   ）","answer":"错"},{"type":"judge","qid":"J107","id":107,"question":"中国现在GDP总量位居世界第二，已经走出了社会主义初级阶段，正在建设发达社会主义。（    ）","answer":"错"},{"type":"judge","qid":"J108","id":108,"question":"目前我国社会主要矛盾是人民日益增长的物质文化需要同落后的社会生产力之间矛盾。（     ）","answer":"错"},{"type":"judge","qid":"J109","id":109,"question":"社会主义初级阶段的主要矛盾是阶级斗争。（   ）","answer":"错"},{"type":"judge","qid":"J110","id":110,"question":"社会主义初级阶段的长期性是由广大群众的文化素质比较低决定的。（   ）","answer":"错"},{"type":"judge","qid":"J111","id":111,"question":"1997年，党的十五大正式使用“邓小平理论”概念，并将其作为党的指导思想写入党章。（    ）","answer":"对"},{"type":"judge","qid":"J112","id":112,"question":"十三届三中全会前，我们在社会主义建设中出现种种失误的根本原因之一，就在于提出的任务和政策不符合社会主义初级阶段的实际。（    ）","answer":"对"},{"type":"judge","qid":"J113","id":113,"question":"社会主义初级阶段是任何国家进入社会主义都会经历的阶段。（    ）","answer":"错"},{"type":"judge","qid":"J114","id":114,"question":"从我国社会主义发展的现实来看，我国已经进入成熟的社会主义社会。（   ）","answer":"错"},{"type":"judge","qid":"J115","id":115,"question":"社会主义初级阶段是我国最大的实际。（   ）","answer":"对"},{"type":"judge","qid":"J116","id":116,"question":"党在社会主义初级阶段的奋斗目标是经济现代化。（   ）","answer":"错"},{"type":"judge","qid":"J117","id":117,"question":"党的基本路线的核心内容是“一个中心，两个基本点”。 （   ）","answer":"对"},{"type":"judge","qid":"J118","id":118,"question":"我国社会主义初级阶段的主要矛盾是生产力与生产关系之间的矛盾。（   ）","answer":"错"},{"type":"judge","qid":"J119","id":119,"question":"1987年4月，邓小平第一次提出了分“三步走”基本实现现代化的战略。同年10月，党的十三大把邓小平“三步走”的发展战略构想确定下来。","answer":"对"},{"type":"judge","qid":"J120","id":120,"question":"改革开放以后，党高度重视发展问题，将发展作为解决中国一切问题的关键。（    ）","answer":"对"},{"type":"judge","qid":"J121","id":121,"question":"实事求是是党的思想路线的核心，也是邓小平理论的精髓。（   ）","answer":"对"},{"type":"judge","qid":"J122","id":122,"question":"社会主义市场经济理论是邓小平留给我们的最重要的思想遗产。（   ）","answer":"错"},{"type":"judge","qid":"J123","id":123,"question":"坚持和发展中国特色社会主义是一篇大文章，邓小平理论为它确定了基本思路和基本原则。（   ）","answer":"对"},{"type":"judge","qid":"J124","id":124,"question":"邓小平提出了“台阶式”发展的思想，要求抓住机遇，加快发展，争取隔几年使国民经济上一个新台阶。（   ）","answer":"对"},{"type":"judge","qid":"J125","id":125,"question":"1982年，邓小平在党的十三大上提出了“建设有中国特色的社会主义”的重大命题。（   ）","answer":"错"},{"type":"judge","qid":"J126","id":126,"question":"社会主义社会发展生产力与资本主义社会发展生产力的目的根本不同。（    ）","answer":"对"},{"type":"judge","qid":"J127","id":127,"question":"邓小平在认真总结国内外社会主义建设的经验教训，特别是在改革开放的实践经验的基础上，创造性地对社会主义本质做出了新的概括。（","answer":"对"},{"type":"judge","qid":"J128","id":128,"question":"社会主义本质理论揭示了社会主义的根本任务是解放和发展生产力，这合乎科学社会主义基本原则，体现了中国社会主义初级阶段发展实践","answer":"对"},{"type":"judge","qid":"J129","id":129,"question":"突出强调解放和发展生产力在社会主义发展中的重要地位。这是邓小平社会主义本质理论的一个十分明显和突出的特点。（    ）","answer":"对"},{"type":"judge","qid":"J130","id":130,"question":"“什么是社会主义、怎样建设社会主义”这一重大问题，是邓小平理论的首要的基本理论问题。（    ）","answer":"对"},{"type":"judge","qid":"J131","id":131,"question":"“建设有中国特色社会主义”这个概念是毛泽东同志第一次提出来的。（    ）","answer":"错"},{"type":"judge","qid":"J132","id":132,"question":"社会主义最大的优越性就是均等，这是体现社会主义本质的一个东西。（    ）","answer":"错"},{"type":"judge","qid":"J133","id":133,"question":"邓小平指出，社会主义财富属于人民。社会主义的原则，第一是发展生产，第二是共同致富。（   ）","answer":"对"},{"type":"judge","qid":"J134","id":134,"question":"强调生产关系在社会主义本质中的地位，是邓小平认识社会主义的一个创造。（    ）","answer":"错"},{"type":"judge","qid":"J135","id":135,"question":"搞清楚什么是社会主义、怎样建设社会主义，关键是要在坚持社会主义基本制度的基础上，进一步认清社会主义的本质。（    ）","answer":"对"},{"type":"judge","qid":"J136","id":136,"question":"社会主义本质的体现是一个动态的过程，人们对社会主义本质的认识也随着实践的推进逐步深入。（    ）","answer":"对"},{"type":"judge","qid":"J137","id":137,"question":"解放和发展生产力，要体现在人民生活水平的“富裕”上，“消灭剥削，消除两极分化”，则是要使这种富裕成为“共同富裕”。（    ）","answer":"对"},{"type":"judge","qid":"J138","id":138,"question":"在邓小平看来，讲社会主义首先就要使生产力发展，这是主要的。只有这样，才能表明社会主义的优越性。（    ）","answer":"对"},{"type":"judge","qid":"J139","id":139,"question":"邓小平把发展社会生产和增强国家综合国力看成是压倒一切的标准，至此，实际上已经是提出了社会主义本质的核心内容。（    ）","answer":"错"},{"type":"judge","qid":"J140","id":140,"question":"革命是解放生产力，改革是发展生产力。（    ）","answer":"错"},{"type":"judge","qid":"J141","id":141,"question":"是邓小平最先提出：科学技术是生产力。（    ）","answer":"错"},{"type":"judge","qid":"J142","id":142,"question":"“仓廪实则知礼节，衣食足则知荣辱”。有了物质文明，精神文明就自然而然发展了。（    ）","answer":"错"},{"type":"judge","qid":"J143","id":143,"question":"十一届三中全会最重要的是提出解放思想，实事求是，团结一致向前看，这是最重要的变化。（    ）","answer":"错"},{"type":"judge","qid":"J144","id":144,"question":"市场经济是资本主义经济制度的本质属性。（    ）","answer":"错"},{"type":"judge","qid":"J145","id":145,"question":"解决台湾问题是中国的内政。(   )","answer":"对"},{"type":"judge","qid":"J146","id":146,"question":"“一国两制”的构想首先是针对台湾问题提出来的。(   )","answer":"对"},{"type":"judge","qid":"J147","id":147,"question":"两制并存是“和平统一、一国两制”的核心。(    )","answer":"错"},{"type":"judge","qid":"J148","id":148,"question":"我国社会主义初级阶段的社会主义改革和过渡时期的社会主义改造是不同的。（    ）","answer":"对"},{"type":"judge","qid":"J149","id":149,"question":"社会主义改革是对社会主义改造的否定。（    ）","answer":"错"},{"type":"judge","qid":"J150","id":150,"question":"所谓全方位就是不论对资本主义国家还是社会主义国家，对发达国家还是发展中国家都实行开放政策。（   ）","answer":"对"},{"type":"judge","qid":"J151","id":151,"question":"人民群众是改革发展的动力中的主体。（    ）","answer":"对"},{"type":"judge","qid":"J152","id":152,"question":"对外开放是我们必须长期坚持的基本国策。（    ）","answer":"对"},{"type":"judge","qid":"J153","id":153,"question":"对外开放必然导致资本主义。（    ）","answer":"错"},{"type":"judge","qid":"J154","id":154,"question":"改革也是解放生产力。（    ）","answer":"对"},{"type":"judge","qid":"J155","id":155,"question":"公有制为主体、多种所有制经济共同发展是社会主义初级阶段的基本经济制度。这一命题的最根本的依据是生产关系一定要适合生产力性质的规律。（    ）","answer":"错"},{"type":"judge","qid":"J156","id":156,"question":"按劳分配是社会主义公有制经济的主要分配制度。多种分配方式并存，就是按劳分配方式与非按劳分配方式并存。非按劳分配方式，主要是指按生产要素分配的方式。（    ）","answer":"错"},{"type":"judge","qid":"J157","id":157,"question":"公有制的性质和实现形式是两个不同的层次的问题。只要有利于生产力的发展，公有制的实现形式可以而且应当的多样化。（    ）","answer":"对"},{"type":"judge","qid":"J158","id":158,"question":"公有制和市场经济不能结合。(     )","answer":"错"},{"type":"judge","qid":"J159","id":159,"question":"发展市场经济对社会主义精神文明建设只能有消极影响。（    ）","answer":"错"},{"type":"judge","qid":"J160","id":160,"question":"只有私有制才能搞市场经济,只有走私有化道路才能促进经济发展。(     )","answer":"错"},{"type":"judge","qid":"J161","id":161,"question":"确立劳动、资本、技术和管理等生产要素按贡献参与分配的原则，说明生产要素是创造价值的源泉。（    ）","answer":"错"},{"type":"judge","qid":"J162","id":162,"question":"私营经济比重的增加，国有经济比重的减少，会影响我国的社会主义性质。 (     )","answer":"错"},{"type":"judge","qid":"J163","id":163,"question":"在很长一段时间内，社会主义经济体制改革的核心问题是正确认识和处理政府和市场的关系。（    ）","answer":"错"},{"type":"judge","qid":"J164","id":164,"question":"在很长一段时间内，社会主义经济体制改革的核心问题是正确认识和处理计划和市场的关系。（    ）","answer":"对"},{"type":"judge","qid":"J165","id":165,"question":"非公有制经济不是社会主义性质的生产关系，在改革过程中需要对其加以限制和引导，防止它坐地做大，危害公有制经济发展。（    ）","answer":"错"},{"type":"judge","qid":"J166","id":166,"question":"在当代中国，坚持发展是硬道理的本质要求就是坚持科学发展。（     ）","answer":"对"},{"type":"judge","qid":"J167","id":167,"question":"建设生态文明，是关乎人民福祉，关乎民族未来的长远大计。（   ）","answer":"对"},{"type":"judge","qid":"J168","id":168,"question":"构建社会主义和谐社会，关键在党。必须加强党对构建社会主义和谐社会的领导，充分发挥党的领导核心作用，坚持立党为公、执政为民，以党的执政能力建设和先进性建设推动社会主义和谐社会建设，为构建社会主义和谐社会提供坚强有力的政治保证。（     ）","answer":"对"},{"type":"judge","qid":"J169","id":169,"question":"社会主义和谐社会不同于以往其他社会形态标榜的社会协调与和谐。（    ）","answer":"错"},{"type":"judge","qid":"J170","id":170,"question":"社会主义和谐社会包含了人与自然、人与社会、人与人以及物种之间的和谐。（    ）","answer":"错"},{"type":"judge","qid":"J171","id":171,"question":"生态文明中的重要责任是尊重自然。（    ）","answer":"错"},{"type":"judge","qid":"J172","id":172,"question":"生态文明中的重要责任是保护自然。（    ）","answer":"对"},{"type":"judge","qid":"J173","id":173,"question":"十八大以来，我国经济建设取得重大成就，经济保持超高速增长。（ ）","answer":"错"},{"type":"judge","qid":"J174","id":174,"question":"十八大以来，我国民主法治建设迈出重大步伐，中国特色社会主义法治理论实现新飞跃。（ ）","answer":"对"},{"type":"judge","qid":"J175","id":175,"question":"影响满足人们美好生活需要的因素很多，最主要的是生产力水平落后。（ ）","answer":"错"},{"type":"judge","qid":"J176","id":176,"question":"坚持和发展中国特色社会主义，是改革开放以来我们党全部理论和实践的鲜明主题。（ ）","answer":"对"},{"type":"judge","qid":"J177","id":177,"question":"中国特色社会主义事业的总布局和战略布局是“五位一体”。（ ）","answer":"错"},{"type":"judge","qid":"J178","id":178,"question":"中国特色社会主义最本质的特征是先进的生产力。（ ）","answer":"错"},{"type":"judge","qid":"J179","id":179,"question":"文化自信是一个国家、一个民族发展中最基本、最深沉、最持久的力量。（ ）","answer":"对"},{"type":"judge","qid":"J180","id":180,"question":"增进民生福祉是发展的目的。（ ）","answer":"对"},{"type":"judge","qid":"J181","id":181,"question":"走进新时代，标志着中国已经全面建成小康社会。（ ）","answer":"错"},{"type":"judge","qid":"J182","id":182,"question":"新时代中国特色社会主义基本方略，即党的十九大概括的“十四个坚持”。（ ）","answer":"对"},{"type":"judge","qid":"J183","id":183,"question":"中国崛起被国际媒体称为“近年来最重要的全球变革”。（  ）","answer":"对"},{"type":"judge","qid":"J184","id":184,"question":"邓小平指出：“中国梦的本质是国家富强、民族振兴、人民幸福。”（  ）","answer":"错"},{"type":"judge","qid":"J185","id":185,"question":"人民幸福是国家富强、民族振兴的根本出发点和落脚点。（  ）","answer":"对"},{"type":"judge","qid":"J186","id":186,"question":"实现中国梦必须走中国道路，这就是社会主义道路。（  ）","answer":"错"},{"type":"judge","qid":"J187","id":187,"question":"实现中国梦必须弘扬中国精神，这就是以爱国主义为核心的民族精神和以改革创新为核心的时代精神。（  ）","answer":"对"},{"type":"judge","qid":"J188","id":188,"question":"党的十九大提出了全面建设小康社会的奋斗目标。（  ）","answer":"错"},{"type":"judge","qid":"J189","id":189,"question":"从全面建成小康社会到基本实现现代化，再到全面建成社会主义现代化强国，是新时代中国特色社会主义发展的战略安排。（  ）","answer":"对"},{"type":"judge","qid":"J190","id":190,"question":"从2020年到2035年，我国要基本实现社会主义现代化。（  ）","answer":"对"},{"type":"judge","qid":"J191","id":191,"question":"从2035年到2050年，我国要建成社会主义现代化强国。（  ）","answer":"对"},{"type":"judge","qid":"J192","id":192,"question":"“家是最小国，国是千万家。”这句话的意思是指中国梦归根到底是人民的梦。（  ）","answer":"错"},{"type":"judge","qid":"J193","id":193,"question":"党的十八届五中全会提出了创新、协调、绿色、开放、共享的新发展理念。（     ）","answer":"对"},{"type":"judge","qid":"J194","id":194,"question":"在新发展理念中，开放注重的是解决人与自然和谐问题。（    ）","answer":"错"},{"type":"judge","qid":"J195","id":195,"question":"共享注重的是解决社会公平正义问题。（    ）","answer":"对"},{"type":"judge","qid":"J196","id":196,"question":"现代化经济体系，是由社会经济活动各个环节、各个层面、各个领域的相互关系和内在联系构成的一个有机整体。（     ）","answer":"对"},{"type":"judge","qid":"J197","id":197,"question":"走中国特色社会主义政治发展道路，必须坚持党的领导、人民 // ============================================================
// HTML escape
// ============================================================
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// State
// ============================================================
var mode = 'single';
var questions = [];      // current question list (from QDATA)
var answers = {};        // {qid: answerString}
var results = {};        // {qid: {is_correct, correct_answer, user_answer}} — populated one by one
var idx = 0;
var submitted = false;   // for mixed/exam: all-at-once submitted
var allResults = null;   // for mixed/exam: batch result

// ============================================================
// Mode switch
// ============================================================
document.getElementById('modeRow').addEventListener('click', function(e) {
  var btn = e.target.closest('.mb');
  if (!btn) return;
  var btns = document.querySelectorAll('.mb');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('on');
  btn.classList.add('on');
  mode = btn.dataset.mode;
  resetAll();
});

function resetAll() {
  answers = {};
  results = {};
  idx = 0;
  submitted = false;
  allResults = null;
  document.getElementById('resultPanel').classList.add('hidden');
  buildQuestions();
  renderAll();
}

function buildQuestions() {
  if (mode === 'single') {
    questions = QDATA.s.slice();
  } else if (mode === 'multi') {
    questions = QDATA.m.slice();
  } else if (mode === 'judge') {
    questions = QDATA.j.slice();
  } else if (mode === 'mixed') {
    questions = QDATA.s.concat(QDATA.m).concat(QDATA.j);
  } else if (mode === 'exam') {
    questions = shuffleSlice(QDATA.s, 70).concat(shuffleSlice(QDATA.m, 20)).concat(shuffleSlice(QDATA.j, 10));
  }
}

function shuffleSlice(arr, n) {
  var copy = arr.slice();
  for (var i = copy.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = copy[i]; copy[i] = copy[j]; copy[j] = t;
  }
  return copy.slice(0, Math.min(n, copy.length));
}

// ============================================================
// Check one answer
// ============================================================
function checkAnswer(q, userAnswer) {
  var correct = q.answer.trim().toUpperCase();
  var ua = userAnswer.trim().toUpperCase();
  var isCorrect;

  if (q.type === 'multi') {
    isCorrect = (ua.split('').sort().join('') === correct.split('').sort().join(''));
  } else if (q.type === 'judge') {
    if (ua === '对' || ua === 'T' || ua === 'TRUE' || ua === 'A') ua = '对';
    if (ua === '错' || ua === 'F' || ua === 'FALSE' || ua === 'B') ua = '错';
    isCorrect = (ua === correct);
  } else {
    isCorrect = (ua === correct);
  }
  return { is_correct: isCorrect, correct_answer: q.answer, user_answer: userAnswer.trim().toUpperCase() };
}

// ============================================================
// Is one-by-one mode?
// ============================================================
function isOneByOne() {
  return mode === 'single' || mode === 'multi' || mode === 'judge';
}

// ============================================================
// Rendering
// ============================================================
function renderAll() {
  if (!questions.length) {
    document.getElementById('quizArea').innerHTML = '<div class="empty"><p>暂无题目</p></div>';
    document.getElementById('submitBtn').style.display = 'none';
    document.getElementById('liveScore').style.display = 'none';
    return;
  }
  // Show submit button only for mixed/exam
  document.getElementById('submitBtn').style.display = isOneByOne() ? 'none' : '';
  document.getElementById('liveScore').style.display = isOneByOne() ? '' : 'none';
  updateLiveScore();
  renderQuestion();
  renderBottomNav();
  updateNavInfo();
}

function updateLiveScore() {
  if (!isOneByOne()) { document.getElementById('liveScore').style.display = 'none'; return; }
  document.getElementById('liveScore').style.display = '';
  var answered = 0, correct = 0;
  for (var i = 0; i < questions.length; i++) {
    var r = results[questions[i].qid];
    if (r) { answered++; if (r.is_correct) correct++; }
  }
  document.getElementById('liveAnswered').textContent = answered;
  document.getElementById('liveCorrect').textContent = correct;
}

function renderQuestion() {
  // Mixed/exam submitted
  if (submitted && allResults) {
    renderSubmittedView();
    return;
  }

  var q = questions[idx];
  if (!q) return;

  var existingResult = results[q.qid];
  var answered = !!existingResult;

  var h = '<div class="qc">';

  // Badge
  var types = {single:['单选题','qt-s'], multi:['多选题','qt-m'], judge:['判断题','qt-j']};
  var ti = types[q.type] || [q.type,''];
  h += '<span class="qt-badge ' + ti[1] + '">' + ti[0] + ' ' + esc(q.qid) + '</span>';

  // Question text
  var qt = esc(q.question).replace(/_{3,}/g, '<span class="q-blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
  h += '<div class="q-txt">' + (idx + 1) + '. ' + qt + '</div>';

  if (answered) {
    // Show already-answered question with result
    var r = existingResult;
    if (q.type === 'judge') {
      h += '<div class="jr">';
      h += '<div class="jb' + (r.user_answer==='对'?' sel':'') + (r.correct_answer==='对'?' ok':'') + ((r.user_answer==='对'&&!r.is_correct)?' er':'') + '" style="pointer-events:none">对</div>';
      h += '<div class="jb' + (r.user_answer==='错'?' sel':'') + (r.correct_answer==='错'?' ok':'') + ((r.user_answer==='错'&&!r.is_correct)?' er':'') + '" style="pointer-events:none">错</div>';
      h += '</div>';
    } else if (q.type === 'multi') {
      h += '<div class="ops">';
      for (var lt in q.options) {
        var inU = (r.user_answer||'').indexOf(lt) >= 0;
        var inC = (r.correct_answer||'').indexOf(lt) >= 0;
        var cls = 'dim';
        if (inC) cls += ' ok';
        if (inU && !inC) cls += ' er';
        h += '<div class="op ' + cls + '"><span class="pfx">' + esc(lt) + '</span> ' + esc(q.options[lt]) + '</div>';
      }
      h += '</div>';
    } else {
      h += '<div class="ops">';
      for (var lt in q.options) {
        var cls = 'dim';
        if (lt === r.correct_answer) cls += ' ok';
        if (lt === r.user_answer && lt !== r.correct_answer) cls += ' er';
        h += '<div class="op ' + cls + '"><span class="pfx">' + esc(lt) + '</span> ' + esc(q.options[lt]) + '</div>';
      }
      h += '</div>';
    }
    if (r.is_correct) {
      h += '<div class="fb ok show">回答正确！</div>';
    } else {
      h += '<div class="fb er show">回答错误！正确答案：<b>' + esc(r.correct_answer) + '</b></div>';
    }
  } else {
    // Active question - show clickable options
    if (q.type === 'judge') {
      h += '<div class="jr">';
      h += '<button class="jb" data-action="judge" data-val="对">对</button>';
      h += '<button class="jb" data-action="judge" data-val="错">错</button>';
      h += '</div>';
      h += '<div class="kbd-hint">键盘: A=对 B=错</div>';
    } else if (q.type === 'multi') {
      h += '<div class="ops">';
      for (var lt in q.options) {
        var sel = (answers[q.qid]||'').indexOf(lt) >= 0;
        h += '<div class="op' + (sel?' sel':'') + '" data-action="multi" data-val="' + esc(lt) + '">';
        h += '<span class="pfx">' + esc(lt) + '</span> ' + esc(q.options[lt]);
        h += '</div>';
      }
      h += '</div>';
      h += '<div style="margin-top:10px;font-size:11px;color:#999;">点击选项切换选择（可多选）· 当前已选：<b>' + (answers[q.qid] || '未选') + '</b> · 键盘A-D切换</div>';
      h += '<div class="sub-row">';
      h += '<button class="btn btn-b" data-action="confirm-multi">确认提交本题</button>';
      h += '<span class="hint">选好后点击此按钮批改</span>';
      h += '</div>';
    } else {
      h += '<div class="ops">';
      for (var lt in q.options) {
        h += '<div class="op" data-action="single" data-val="' + esc(lt) + '">';
        h += '<span class="pfx">' + esc(lt) + '</span> ' + esc(q.options[lt]);
        h += '</div>';
      }
      h += '</div>';
      h += '<div class="kbd-hint">点击选项或按键盘A-D选择，选择后自动批改</div>';
    }
  }

  h += '</div>';
  document.getElementById('quizArea').innerHTML = h;
  updateNavInfo();
}

// ============================================================
// Event delegation
// ============================================================
document.getElementById('quizArea').addEventListener('click', function(e) {
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;
  var val = el.dataset.val;

  if (isOneByOne()) {
    var q = questions[idx];
    if (!q || results[q.qid]) return; // already answered

    if (action === 'single') {
      // Immediately check
      var r = checkAnswer(q, val);
      results[q.qid] = r;
      answers[q.qid] = val;
      renderQuestion();
      renderBottomNav();
      updateLiveScore();
      // Auto advance after short delay
      setTimeout(function() {
        if (idx < questions.length - 1 && results[questions[idx].qid]) {
          goNext();
        }
      }, 800);
    } else if (action === 'judge') {
      var r = checkAnswer(q, val);
      results[q.qid] = r;
      answers[q.qid] = val;
      renderQuestion();
      renderBottomNav();
      updateLiveScore();
      setTimeout(function() {
        if (idx < questions.length - 1 && results[questions[idx].qid]) {
          goNext();
        }
      }, 800);
    } else if (action === 'multi') {
      var cur = answers[q.qid] || '';
      if (cur.indexOf(val) >= 0) cur = cur.replace(val, '');
      else cur += val;
      answers[q.qid] = cur.split('').sort().join('');
      renderQuestion();
    } else if (action === 'confirm-multi') {
      var ans = answers[q.qid] || '';
      if (!ans) { alert('请先选择选项'); return; }
      var r = checkAnswer(q, ans);
      results[q.qid] = r;
      renderQuestion();
      renderBottomNav();
      updateLiveScore();
      setTimeout(function() {
        if (idx < questions.length - 1 && results[questions[idx].qid]) {
          goNext();
        }
      }, 800);
    }
  } else {
    // Mixed/exam mode: just record answer, no immediate check
    var q = questions[idx];
    if (!q || submitted) return;
    if (action === 'single') {
      answers[q.qid] = val;
      renderQuestion();
    } else if (action === 'judge') {
      answers[q.qid] = val;
      renderQuestion();
    } else if (action === 'multi') {
      var cur = answers[q.qid] || '';
      if (cur.indexOf(val) >= 0) cur = cur.replace(val, '');
      else cur += val;
      answers[q.qid] = cur.split('').sort().join('');
      renderQuestion();
    }
  }
});

// ============================================================
// Navigation
// ============================================================
function goNext() {
  if (idx < questions.length - 1) { idx++; refreshNav(); }
}

function goPrev() {
  if (idx > 0) { idx--; refreshNav(); }
}

function goJump() {
  var n = parseInt(document.getElementById('jumpTop').value);
  if (isNaN(n) || n < 1) n = 1;
  if (n > questions.length) n = questions.length;
  idx = n - 1;
  refreshNav();
}

function refreshNav() {
  renderQuestion();
  renderBottomNav();
  updateNavInfo();
  document.getElementById('jumpTop').value = idx + 1;
}

function updateNavInfo() {
  var total = questions.length;
  var answeredCount = Object.keys(results).length;
  if (!isOneByOne()) answeredCount = Object.keys(answers).length;
  document.getElementById('navInfo').textContent = (idx + 1) + ' / ' + total + '  已答：' + answeredCount;
}

function renderBottomNav() {
  var h = '';
  h += '<button class="btn btn-o" onclick="goPrev()">&#9664; 上一题</button>';
  h += '<button class="btn btn-o" onclick="goNext()">下一题 &#9654;</button>';
  h += '<label for="jumpBot" style="font-size:12px;">跳转:</label>';
  h += '<input type="number" id="jumpBot" min="1" max="' + questions.length + '" value="' + (idx + 1) + '" onkeydown="if(event.key===\'Enter\')goJump2()" style="width:56px;padding:5px 6px;border:1px solid #d9d9d9;border-radius:5px;font-size:12px;text-align:center">';
  h += '<button class="btn btn-o" onclick="goJump2()">GO</button>';
  h += '<span style="color:#999;font-size:11px;margin-left:4px">' + (idx + 1) + ' / ' + questions.length + '</span>';
  document.getElementById('bottomNav').innerHTML = h;
}

function goJump2() {
  var n = parseInt(document.getElementById('jumpBot').value);
  if (isNaN(n) || n < 1) n = 1;
  if (n > questions.length) n = questions.length;
  idx = n - 1;
  refreshNav();
}

// Keyboard
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') { goNext(); return; }
  if (e.key === 'ArrowLeft') { goPrev(); return; }

  if (isOneByOne()) {
    var q = questions[idx];
    if (!q || results[q.qid]) return;
    var k = e.key.toUpperCase();
    if (q.type === 'judge') {
      if (k === 'A' || k === '1') {
        var r = checkAnswer(q, '对');
        results[q.qid] = r; answers[q.qid] = '对';
        renderQuestion(); renderBottomNav(); updateLiveScore();
        setTimeout(function(){ if(idx<questions.length-1&&results[questions[idx].qid])goNext(); }, 800);
      }
      if (k === 'B' || k === '2') {
        var r = checkAnswer(q, '错');
        results[q.qid] = r; answers[q.qid] = '错';
        renderQuestion(); renderBottomNav(); updateLiveScore();
        setTimeout(function(){ if(idx<questions.length-1&&results[questions[idx].qid])goNext(); }, 800);
      }
    } else if (q.type === 'multi') {
      if (['A','B','C','D'].indexOf(k) >= 0) {
        var cur = answers[q.qid] || '';
        if (cur.indexOf(k) >= 0) cur = cur.replace(k, '');
        else cur += k;
        answers[q.qid] = cur.split('').sort().join('');
        renderQuestion();
      }
      if (e.key === 'Enter') {
        e.preventDefault();
        var ans = answers[q.qid] || '';
        if (!ans) return;
        var r = checkAnswer(q, ans);
        results[q.qid] = r;
        renderQuestion(); renderBottomNav(); updateLiveScore();
        setTimeout(function(){ if(idx<questions.length-1&&results[questions[idx].qid])goNext(); }, 800);
      }
    } else {
      if (['A','B','C','D'].indexOf(k) >= 0) {
        var r = checkAnswer(q, k);
        results[q.qid] = r; answers[q.qid] = k;
        renderQuestion(); renderBottomNav(); updateLiveScore();
        setTimeout(function(){ if(idx<questions.length-1&&results[questions[idx].qid])goNext(); }, 800);
      }
    }
  } else {
    // Mixed/exam mode
    var q = questions[idx];
    if (!q || submitted) return;
    var k = e.key.toUpperCase();
    if (q.type === 'judge') {
      if (k === 'A' || k === '1') { answers[q.qid] = '对'; renderQuestion(); }
      if (k === 'B' || k === '2') { answers[q.qid] = '错'; renderQuestion(); }
    } else if (q.type === 'multi') {
      if (['A','B','C','D'].indexOf(k) >= 0) {
        var cur = answers[q.qid] || '';
        if (cur.indexOf(k) >= 0) cur = cur.replace(k, '');
        else cur += k;
        answers[q.qid] = cur.split('').sort().join('');
        renderQuestion();
      }
    } else {
      if (['A','B','C','D'].indexOf(k) >= 0) { answers[q.qid] = k; renderQuestion(); }
    }
  }
});

// ============================================================
// Submit (mixed/exam only)
// ============================================================
function doSubmit() {
  if (isOneByOne()) return;

  var qidList = [];
  for (var i = 0; i < questions.length; i++) qidList.push(questions[i].qid);
  var unanswered = 0;
  for (var i = 0; i < qidList.length; i++) {
    if (!answers[qidList[i]]) unanswered++;
  }
  if (unanswered > 0) {
    if (!confirm('还有 ' + unanswered + ' 道题未作答，确定提交吗？')) return;
  }

  document.getElementById('quizArea').innerHTML = '<div class="empty"><div class="spin"></div>正在批改...</div>';
  document.getElementById('submitBtn').disabled = true;

  // Check locally
  var correctCount = 0;
  var stats = {single:[0,0], multi:[0,0], judge:[0,0]};
  var rlist = [];
  for (var i = 0; i < qidList.length; i++) {
    var qid = qidList[i];
    var q = findQuestion(qid);
    if (!q) continue;
    var r = checkAnswer(q, answers[qid] || '');
    r.qid = qid;
    r.type = q.type;
    r.question = q.question;
    r.options = q.options || {};
    rlist.push(r);
    if (r.is_correct) correctCount++;
    stats[q.type][0] += r.is_correct ? 1 : 0;
    stats[q.type][1]++;
  }

  allResults = {
    total: rlist.length,
    correct_count: correctCount,
    score: Math.round(correctCount / Math.max(1, rlist.length) * 1000) / 10,
    single_correct: stats.single[0], single_total: stats.single[1],
    multi_correct: stats.multi[0], multi_total: stats.multi[1],
    judge_correct: stats.judge[0], judge_total: stats.judge[1],
    results: rlist
  };
  submitted = true;
  renderSubmittedView();
  renderResultPanel();
  renderBottomNav();
}

function findQuestion(qid) {
  for (var i = 0; i < questions.length; i++) {
    if (questions[i].qid === qid) return questions[i];
  }
  // Search all banks
  for (var t in QDATA) {
    var arr = QDATA[t];
    for (var j = 0; j < arr.length; j++) {
      if (arr[j].qid === qid) return arr[j];
    }
  }
  return null;
}

function renderSubmittedView() {
  var q = questions[idx];
  if (!q) return;
  var r = null;
  for (var i = 0; i < allResults.results.length; i++) {
    if (allResults.results[i].qid === q.qid) { r = allResults.results[i]; break; }
  }
  if (!r) return;

  var h = '<div class="qc">';
  var types = {single:['单选题','qt-s'], multi:['多选题','qt-m'], judge:['判断题','qt-j']};
  var ti = types[q.type] || [q.type,''];
  h += '<span class="qt-badge ' + ti[1] + '">' + ti[0] + ' ' + esc(q.qid) + '</span>';
  var qt = esc(q.question).replace(/_{3,}/g, '<span class="q-blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
  h += '<div class="q-txt">' + (idx + 1) + '. ' + qt + '</div>';

  if (q.type === 'judge') {
    h += '<div class="jr">';
    h += '<div class="jb' + (r.user_answer==='对'?' sel':'') + (r.correct_answer==='对'?' ok':'') + ((r.user_answer==='对'&&!r.is_correct)?' er':'') + '" style="pointer-events:none">对</div>';
    h += '<div class="jb' + (r.user_answer==='错'?' sel':'') + (r.correct_answer==='错'?' ok':'') + ((r.user_answer==='错'&&!r.is_correct)?' er':'') + '" style="pointer-events:none">错</div>';
    h += '</div>';
  } else if (q.type === 'multi') {
    h += '<div class="ops">';
    for (var lt in q.options) {
      var inU = (r.user_answer||'').indexOf(lt) >= 0;
      var inC = (r.correct_answer||'').indexOf(lt) >= 0;
      var cls = 'dim';
      if (inC) cls += ' ok';
      if (inU && !inC) cls += ' er';
      h += '<div class="op ' + cls + '"><span class="pfx">' + esc(lt) + '</span> ' + esc(q.options[lt]) + '</div>';
    }
    h += '</div>';
  } else {
    h += '<div class="ops">';
    for (var lt in q.options) {
      var cls = 'dim';
      if (lt === r.correct_answer) cls += ' ok';
      if (lt === r.user_answer && lt !== r.correct_answer) cls += ' er';
      h += '<div class="op ' + cls + '"><span class="pfx">' + esc(lt) + '</span> ' + esc(q.options[lt]) + '</div>';
    }
    h += '</div>';
  }
  if (r.is_correct) {
    h += '<div class="fb ok show">回答正确！</div>';
  } else {
    h += '<div class="fb er show">回答错误！正确答案：<b>' + esc(r.correct_answer) + '</b></div>';
  }
  h += '</div>';
  document.getElementById('quizArea').innerHTML = h;
  updateNavInfo();
}

function renderResultPanel() {
  if (!allResults) return;
  var d = allResults;
  var h = '<h2>' + d.score + ' 分</h2>';
  h += '<div class="sc-d">' + d.correct_count + ' / ' + d.total + ' 正确</div>';
  if (d.single_total > 0) h += '<div class="sc-d">单选题：' + d.single_correct + '/' + d.single_total + ' (' + Math.round(d.single_correct/Math.max(1,d.single_total)*100) + '%)</div>';
  if (d.multi_total > 0) h += '<div class="sc-d">多选题：' + d.multi_correct + '/' + d.multi_total + ' (' + Math.round(d.multi_correct/Math.max(1,d.multi_total)*100) + '%)</div>';
  if (d.judge_total > 0) h += '<div class="sc-d">判断题：' + d.judge_correct + '/' + d.judge_total + ' (' + Math.round(d.judge_correct/Math.max(1,d.judge_total)*100) + '%)</div>';
  h += '<table class="rt"><thead><tr><th>题号</th><th>类型</th><th>题目</th><th>你的答案</th><th>正确答案</th><th>结果</th></tr></thead><tbody>';
  for (var i = 0; i < d.results.length; i++) {
    var r = d.results[i];
    h += '<tr class="' + (r.is_correct?'rok':'rerr') + '">';
    h += '<td>' + esc(r.qid) + '</td>';
    var tm = {single:'单选',multi:'多选',judge:'判断'};
    h += '<td>' + (tm[r.type]||r.type) + '</td>';
    h += '<td style="max-width:260px">' + esc(r.question.substring(0,60)) + '...</td>';
    h += '<td>' + esc(r.user_answer||'未答') + '</td>';
    h += '<td>' + esc(r.correct_answer) + '</td>';
    h += '<td><span class="badge ' + (r.is_correct?'badge-ok':'badge-er') + '">' + (r.is_correct?'正确':'错误') + '</span></td>';
    h += '</tr>';
  }
  h += '</tbody></table>';
  h += '<button class="btn btn-r" onclick="resetAll()" style="margin-top:12px">重新开始</button>';
  document.getElementById('resultPanel').innerHTML = h;
  document.getElementById('resultPanel').classList.remove('hidden');
  document.getElementById('resultPanel').scrollIntoView({behavior:'smooth'});
}
</script>
