<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>毛中特题库刷题软件</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#f0f2f5;min-height:100vh;color:#333}
.hdr{background:linear-gradient(135deg,#d4380d,#ad2102);color:#fff;padding:12px 18px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:18px;font-weight:600}
.hdr .score-box{background:rgba(255,255,255,.15);border-radius:8px;padding:6px 14px;font-size:13px;min-width:80px;text-align:center}
.hdr .score-box b{font-size:20px}
.container{max-width:840px;margin:0 auto;padding:14px}

/* Mode */
.m-bar{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.m-bar h3{font-size:12px;margin-bottom:8px;color:#999;font-weight:400}
.m-row{display:flex;gap:6px;flex-wrap:wrap}
.mb{flex:1;min-width:80px;padding:9px 6px;border:2px solid #eee;border-radius:7px;background:#fff;cursor:pointer;font-size:12px;text-align:center;transition:.15s;line-height:1.4}
.mb:hover{border-color:#d4380d;color:#d4380d}
.mb.on{border-color:#d4380d;background:#fff1f0;color:#d4380d;font-weight:600}
.mb.ex{border-color:#faad14}
.mb.ex.on{background:#fffbe6;border-color:#faad14;color:#d48806}
.mb small{display:block;font-size:10px;color:#999;margin-top:2px}
.mb.on small{color:inherit;opacity:.7}

/* Controls */
.ctl{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px;background:#fff;border-radius:10px;padding:9px 12px;box-shadow:0 1px 3px rgba(0,0,0,.06);font-size:12px}
.ctl label{color:#999;white-space:nowrap}
.ctl input[type=number]{width:58px;padding:5px 6px;border:1px solid #d9d9d9;border-radius:5px;font-size:12px;text-align:center}
.btn{padding:6px 12px;border:none;border-radius:5px;font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap}
.btn-o{background:#f5f5f5;color:#333;border:1px solid #d9d9d9}
.btn-o:hover{border-color:#d4380d;color:#d4380d}
.btn-r{background:#d4380d;color:#fff}
.btn-r:hover{background:#ad2102}
.btn-g{background:#52c41a;color:#fff;font-size:13px;padding:8px 24px}
.btn-g:hover{background:#389e0d}
.btn-b{background:#1890ff;color:#fff;font-size:13px;padding:8px 20px}
.btn-b:hover{background:#096dd9}
.nav-i{font-size:11px;color:#aaa;margin-left:auto}

/* Question */
.qc{background:#fff;border-radius:10px;padding:20px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);min-height:160px}
.qt-badge{display:inline-block;padding:1px 7px;border-radius:3px;font-size:11px;margin-bottom:8px;font-weight:600}
.qt-s{background:#e6f7ff;color:#1890ff}
.qt-m{background:#fff7e6;color:#fa8c16}
.qt-j{background:#f6ffed;color:#52c41a}
.q-txt{font-size:15px;line-height:1.9;margin-bottom:16px;color:#1a1a1a}
.q-blank{color:#d4380d;text-decoration:underline;padding:0 4px}

/* Options */
.ops{display:flex;flex-direction:column;gap:7px}
.op{display:flex;align-items:flex-start;padding:10px 12px;border:2px solid #f0f0f0;border-radius:7px;cursor:pointer;transition:.15s;font-size:14px;line-height:1.6;user-select:none}
.op:hover{border-color:#ffa39e;background:#fffaf0}
.op.sel{border-color:#d4380d;background:#fff1f0}
.op.ok{border-color:#52c41a;background:#f6ffed}
.op.er{border-color:#ff4d4f;background:#fff2f0}
.op.dim{pointer-events:none;opacity:.7}
.op .pfx{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:#f0f0f0;margin-right:10px;flex-shrink:0;font-weight:600;font-size:12px}
.op.sel .pfx{background:#d4380d;color:#fff}
.op.ok .pfx{background:#52c41a;color:#fff}
.op.er .pfx{background:#ff4d4f;color:#fff}

/* Judge */
.jr{display:flex;gap:12px}
.jb{flex:1;padding:13px;border:2px solid #f0f0f0;border-radius:7px;font-size:17px;cursor:pointer;text-align:center;transition:.15s;background:#fff}
.jb:hover{border-color:#d4380d}
.jb.sel{border-color:#d4380d;background:#fff1f0;font-weight:600}

/* Feedback */
.fb{margin-top:12px;padding:10px 14px;border-radius:6px;font-size:13px;display:none}
.fb.show{display:block}
.fb.ok{background:#f6ffed;border:1px solid #b7eb8f;color:#389e0d}
.fb.er{background:#fff2f0;border:1px solid #ffccc7;color:#cf1322}

/* Submit row */
.sub-row{display:flex;gap:10px;align-items:center;margin-top:14px}
.sub-row .hint{font-size:11px;color:#999}

/* Score */
.sc-panel{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);text-align:center}
.sc-panel h2{font-size:24px;color:#d4380d;margin-bottom:4px}
.sc-d{font-size:12px;color:#666;margin-bottom:8px}

/* Result table */
.rt{width:100%;border-collapse:collapse;margin-top:12px;font-size:11px}
.rt th{background:#fafafa;padding:7px;text-align:left;border-bottom:2px solid #eee}
.rt td{padding:7px;border-bottom:1px solid #f0f0f0;vertical-align:top}
.rt .rok{background:#fcfff5}
.rt .rerr{background:#fffbf0}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.badge-ok{background:#f6ffed;color:#52c41a}
.badge-er{background:#fff2f0;color:#ff4d4f}

.empty{text-align:center;padding:50px 20px;color:#aaa}
.hidden{display:none}
.nav-row{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap}

/* Tooltip for answer input */
.answer-input-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.answer-input-row input{flex:1;max-width:200px;padding:6px 10px;border:1px solid #d9d9d9;border-radius:5px;font-size:13px}

@media(max-width:600px){
  .container{padding:6px}
  .qc{padding:14px}
  .q-txt{font-size:13px}
  .m-row{flex-direction:column}
  .ctl{flex-direction:column;align-items:stretch}
  .hdr{flex-direction:column;text-align:center}
}

/* Loading */
.spin{display:inline-block;width:18px;height:18px;border:2px solid #f0f0f0;border-top-color:#d4380d;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Keyboard hint */
.kbd-hint{font-size:10px;color:#bbb;margin-top:4px}
</style>
</head>

人在城市是强大的，而在广大的农村比较薄弱","D":"中国经济以地方性农业经济为主，便于在农村实行“工农武装割据”"},"answer":"A"},{"type":"single","qid":"S130","id":130,"question":"中国共产党与其他政党的根本区别是（    ) 。","options":{"A":"它是中国工人阶级的先锋队","B":"它是中国人民和中华民族的先锋队","C":"它是中国特色社会主义事业的领导核心","D":"它以全心全意为人民服务为宗旨"},"answer":"D"},{"type":"single","qid":"S131","id":131,"question":"毛泽东在《论人民民主专政》一文中指出，总结我们经验，集中到一点，就是（    ) 。","options":{"A":"工人阶级（经过共产党) 领导的以工农联盟为基础的人民民主专政","B":"走农村包围城市，最后夺取全国胜利的道路","C":"团结一切可以团结的力量，建立最广泛的人民民主统一战线","D":"根据政治形势、阶级关系和实际情况及其变化制定党的政策"},"answer":"A"},{"type":"single","qid":"S132","id":132,"question":"中国共产党在新民主主义革命的不同时期建立过不同政权形式，而对地主阶级态度差别最大的两种政权形式是（    ) 。","options":{"A":"工农民主政权与苏维埃政权","B":"工农民主政权与“三三制”政权","C":"人民民主专政与苏维埃政权","D":"工农民主政权与人民民主专政"},"answer":"B"},{"type":"single","qid":"S133","id":133,"question":"新民主主义革命不是一般的资产阶级革命，而是新式的特殊的资产阶级革命，最根本的原因是（    ) 。","options":{"A":"指导思想不同","B":"革命的前途不同","C":"领导阶级不同","D":"革命的纲领不同"},"answer":"C"},{"type":"single","qid":"S134","id":134,"question":"《共同纲领》规定我国的国体是（    ) 。","options":{"A":"中共一大","B":"中共二大","C":"中共三大","D":"中共四大"},"answer":"C"},{"type":"single","qid":"S135","id":135,"question":"中国共产党领导的革命统一战线的最基本的联盟是（    ) 。","options":{"A":"无产阶级和民族资产阶级的联盟","B":"无产阶级和其他非劳动阶级的联盟","C":"工农联盟","D":"无产阶级同城市小资产阶级的联盟"},"answer":"C"},{"type":"single","qid":"S136","id":136,"question":"近代中国的社会性质和主要矛盾，决定了中国革命是（    ) 。","options":{"A":"资产阶级民主革命","B":"社会主义革命","C":"共产主义革命","D":"民族民主革命"},"answer":"A"},{"type":"single","qid":"S137","id":137,"question":"中国共产党成立后，开始把马克思主义与中国革命具体实际相结合。1922年（    ) 明确提出了党在民主革命阶段的纲领。","options":{"A":"没收封建地主阶级的土地归新民主主义国家所有","B":"没收官僚垄断资本归新民主主义国家所有","C":"解决农民的土地问题","D":"保护民族工商业"},"answer":"B"},{"type":"single","qid":"S138","id":138,"question":"新民主主义革命的中心内容是（    ) 。","options":{"A":"没收封建地主阶级的土地归新民主主义国家所有","B":"没收官僚垄断资本归新民主主义国家所有","C":"解决农民的土地问题","D":"保护民族工商业"},"answer":"C"},{"type":"single","qid":"S139","id":139,"question":"人民民主专政具有广泛的民主性，它相对于其他国家无产阶级专政的最大特点是包括（    ) 。","options":{"A":"小资产阶级","B":"工人阶级","C":"农民阶级","D":"民族资产阶级"},"answer":"D"},{"type":"single","qid" "世界人民"},"answer":"A"},{"type":"single","qid":"S598","id":598,"question":"中国共产党的最大政治优势是（ ) 。","options":{"A":"建立国家政权","B":"掌握军队和警察","C":"密切联系群众","D":"执政党地位"},"answer":"C"},{"type":"single","qid":"S599","id":599,"question":"中国共产党是中国革命和建设事业的领导核心，这种领导地位是（ ) 。","options":{"A":"由党的组织决定的","B":"由党的性质决定的","C":"由党的路线决定的","D":"由党章党纲规定的"},"answer":"B"},{"type":"single","qid":"S600","id":600,"question":"中国共产党的性质决定宗旨是（ ) 。改成“中国共产党的宗旨是”，或“中国共产党的性质决定了其宗旨是”","options":{"A":"全心意为人民服务","B":"坚持马克思主义","C":"坚持民主集中制","D":"实现共产主义"},"answer":"A"},{"type":"single","qid":"S601","id":601,"question":"中国共产党的宗旨是（ )","options":{"A":"实现社会主义现代化","B":"坚持党的基本路线不动摇","C":"全心全意为人民服务","D":"实现共产主义"},"answer":"C"},{"type":"single","qid":"S602","id":602,"question":"中国特色社会主义最本质的特征是（  ) 。","options":{"A":"中国共产党的领导","B":"人民民主专政","C":"马克思主义指导","D":"社会主义本质"},"answer":"A"},{"type":"single","qid":"S603","id":603,"question":"中国特色社会主义制度的最大优势是（  ) 。","options":{"A":"人民当家作主","B":"公有制","C":"中国共产党的领导","D":"共同富裕"},"answer":"C"},{"type":"single","qid":"S604","id":604,"question":"马克思主义政党学说的基本原则是（  ) 。","options":{"A":"党是最高组织领导力量","B":"党是最高政治领导力量","C":"党是最高经济领导力量","D":"党是最高行政领导力量"},"answer":"B"},{"type":"single","qid":"S605","id":605,"question":"社会主义基本制度确立后，如何在中国这样一个经济文化比较落后的东方大国建设和巩固社会主义，是党面临的全新课题。1956年4月，毛泽东作了《论十大关系》的报告，在初步总结我国社会主义建设经验的基础上，从十个方面论述了我国社会主义建设需要重点把握的重大关系。“十大关系”所围绕的基本方针是","options":{"A":"正确处理人民内部矛盾","B":"调动一切积极因素为社会主义事业服务","C":"既反保守又反冒进、在综合平衡中稳步前进","D":"集中力量向科学进军"},"answer":"B"},{"type":"single","qid":"S606","id":606,"question":"西藏自治区成立五十年来，通过实行民族区域自治制度，从落后走向先进，从贫穷走向富裕，从封闭走向开放，社会制度实现了历史性的跨越。今天的西藏，社会稳定，经济发展、民生改善、生态向好，各方面成绩卓著。实践证明，民族区域自治制度是适合民族地区特点、具有中国特色的一项基本政治制度。民族区域自治的核心是","options":{"A":"保障少数民族当家作主、管理本民族本地方事务的权利","B":"实现各民族平等、团结、合作和共同繁荣","C":"汉族离不开少数民族，少数民族离不开汉族","D":"凝聚力量，增进共识"},"answer":"A"},{"type":"single","qid":"S607","id":607,"question":"从中华人民共和国成立到社会主义改造基本完成，是我国从新民主主义到社会主义的过渡时期，这一时期，个体经济向社会主义集体经济过渡的形式是（　）。","options":{"A":"国营经济","B":"私人资本主义经济","C":"合作社经济","D":"国家资本主义经济"},"answer":"C"},{"type":"single","qid":"S608","id":608,"question":"协调推进“四个全面”战略布局，是党的十八大以来党中央从实现“两个一百年”奋斗目标、实现中华民族伟大复兴的中国梦的战略高度，统敌国内国际两个大局，把握我国发展新征确定的治国理政新方略。在“四个全面”战略布局中居于引领地位的是（　）。","options":{"A":"全面从严治党","B":"全面深化改革","C":"全面依法治国","D":"全面建成小康社会"},"answer":"D"},{"type":"single","qid":"S609","id":609,"question":"随着工业化、城镇化的深入推进，大量农民转向非农产业，我国农村土地流转现象日益普遍。农业经营方式发生深刻变化，截至2016年6月，全国家庭承包经营耕地流转已超过30%，流转土地4.6亿亩。当前，为解决拥有土地承包经营权的人不再种地、种地的人又没有相应权利这一突出问题，我国在深化农村改革方面作出了重大制度创新是（　）。","options":{"A":"实行农村集体经营性建设用地入市","B":"实行农村家庭联产承包责任制","C":"实行农村土地所有权、承包权、经营权分置","D":"实行农村耕地保护制度"},"answer":"C"},{"type":"single","qid":"S610","id":610,"question":"经济建设是全党的中心工作，坚持以经济建设为中心不动据。就必须坚持以经济体制改革为重点不动据。当前，我国深化经济体制改革的重点是(  )","options":{"A":"扩大优质增量供给，实现供需动态平衡","B":"完善产权制度和要素市场化配置","C":"加快培育国际经济合作和竞争新优势","D":"建立更加有效的区域协调发展新机制"},"answer":"B"},{"type":"single","qid":"S611","id":611,"question":"实行人民民主，保证人民当家作主，实现形式是丰富多样的。经过长期探索，我国在通过依法选举让人民的代表来参与国家生活和社会生活管理的同时，找到了一种保证人民在日常政治生活中有广泛持续深入参与权利的特有民主形式，这一特有民主形式是(  )","options":{"A":"谈判民主","B":"协商民主","C":"票决民主","D":"竞争性民主"},"answer":"B"},{"type":"single","qid":"S612","id":612,"question":"党的十八大以来，我国大力实施创新驱动发展战略，加快创新型国家建设，成果丰硕，天宫、蛟龙、天眼、悟空、墨子、大飞机等重大科技成果相继问世。我国实施创新驱动发展战略所坚持的方针是(  )","options":{"A":"集中力量、重点突破、实现跨越式发展","B":"企业为主体、市场为导向、产学研相结合","C":"自主创新、重点跨越、支撑发展、引领未来","D":"原始创新、集成创新、引进消化吸收再创新"},"answer":"C"},{"type":"single","qid":"S613","id":613,"question":"解决台湾问题、实现祖国完全统一，是全体中华儿女共同愿望，是中华民族根本利益所在。党的十八大以来，在以习近平同志为核心的党中央坚强领导下，在两岸同胞共同努力下，两岸关系取得重要积极成果。两岸关系和平发展的政治基础是(  )","options":{"A":"坚持\"九二共识\"，反对\"台独\"","B":"相互尊重，求同存异","C":"增强两岸同胞的民族认同、文化认同、国家认同","D":"深化两岸利益融合，共创两岸互利双赢，增强两岸同胞福祉"},"answer":"A"},{"type":"single","qid":"S614","id":614,"question":"2017年中央1号文件聚焦\"三农\"工作，提出新的历史阶段我国农业农村工作的主线是(  )","options":{"A":"改善农业生态环境","B":"发展农村新产业新业态","C":"确保国家粮食安全","D":"深入推进农业供给侧结构性改"},"answer":"D"},{"type":"single","qid":"S615","id":615,"question":"习近平新时代中国特色社会主义思想是对马克思列宁主义、毛泽东思想、邓小平理论、“三个代表”重要 思想，科学发展观的继承和发展，是马克思主义中国化最新成果，是党和人民实践经验和集体智慧的结晶， 是中国特色社会主义理论体系的重要组成部分，是全党全国人民为实现中华民族伟大复兴而奋斗的行动指南。 这一思想的核心要以是( )","options":{"A":"坚持和发展中国特色社会主义","B":"实现社会主义现代化","C":"推进马克思主义中国化时代化大众化","D":"坚持以经济建设为中心"},"answer":"A"},{"type":"single","qid":"S616","id":616,"question":"党的十八大以来，为更好地适应我国国家安全面临的新形势新任务实现国家长治久安，我们党明确提出了 总体国家安全观。总体国家安全观的宗旨是( )","options":{"A":"政治安全","B":"经济安全","C":"人民安全","D":"军事、文化、社会安全"},"answer":"C"},{"type":"single","qid":"S617","id":617,"question":"高度重视和不断加强党的自身建设，是中国共产党从小到大、由弱变强，从挫折中奋起，在战胜困难中不 断成熟的一大法宝，也是党领导的伟大事业不断取得胜利的根本保证。中国特色社会主义进入新时代，党的 建设根本方针是( )","options":{"A":"全面加强党的执政本领","B":"坚持党要管党、全面从严治党","C":"坚持解放思想、改革创新","D":"全面推进党的政治建设"},"answer":"B"},{"type":"single","qid":"S618","id":618,"question":"党的十九大提出实施乡村振兴战略，是以习近平同志为核心的党中央着眼党和国家事业全局，深刻把握现 代化建设规律和城乡关系变化特征，顺应亿万农民对美好生活的向往，对“三农”工作作出的重大决策部署， 是新时代做好“三农”工作的总抓手。实施乡村振兴战略的根本目的是( )","options":{"A":"确保国家粮食安全","B":"建立新型土地承包关系","C":"转移农村剩余劳动力","D":"推进农业农村现代化"},"answer":"D"},{"type":"single","qid":"S619","id":619,"question":"“什么是社会主义？怎样建设社会主义？”是邓小平在领导改革开放的现代化建设这一新的革命过程中，不断提出和反复思考的、首要的基本理论问题，搞清楚这一问题的关键是","options":{"A":"在认清基本国情的基础上，进一步把握我国社会主义的发展阶段","B":"在正确分析我国社会主义矛盾的基础上，进一步明确社会主义的根本任务","C":"在坚持我国社会主义基本制度的基础上，进一步揭示社会主义的本质","D":"在总结我国社会主义历史经验的基础上，进一步揭示社会主义社会发展的一般规律"},"answer":"C"},{"type":"single","qid":"S620","id":620,"question":"实体经济是一国经济的立身之本和财富之源，是国家强盛的重要支撑，党的十九大报告指出，建设现代化经济体系必须着力发展实体经济，全面提升实体经济发展水平，我国全面提升实体经济的重点是( )","options":{"A":"加快发展先进制造业","B":"深化要素市场化配置改革","C":"加大人力资本培育力度","D":"持续推进“三去一降一补”"},"answer":"A"},{"type":"single","qid":"S621","id":621,"question":"人民政协作为统一战线组织、多党合作和政治协商的机构、人民民主的重要实现形式，是具有中国特色的制度安排。2019 年 9 月 20 日，习近平在中央政协工作会议暨庆祝中国人民政治协商会议成立 70 周年大会上的讲话中，提出了新时代加强和改进人民政协工作的总体要求，指出新时代做好人民政协工作的中心环节是( )","options":{"A":"提高政治协商、民主监督、参政议政水平","B":"加强思想政治引领，广泛凝聚共识","C":"发挥好人民政协专门协商机构作用","D":"强化政协委员责任担当"},"answer":"B"},{"type":"single","qid":"S622","id":622,"question":"1979 年 1 月 1 日，全国人民代表大会常务委员会发表《告台湾同胞书》，郑重宣示争取祖国和平统一的大政方针，揭开了两岸关系发展新的历史篇章。2019 年 1 月 2 日，习近平在《告台湾同胞书》发表 40 周年纪念会上的讲话中指出:“在一个中国原则基础上，台湾任何政党、团体同我们的交往都不存在障碍。以对话取代对抗、以合作取代争斗、以双赢取代零和，两岸关系才能行稳致远。”影响两岸关系行稳致远的总根子是(  )","options":{"A":"两岸对历史现状缺乏认同","B":"两岸长期存在的政治分歧","C":"“台独”分裂势力的存在","D":"外部势力的干涉"},"answer":"B"},{"type":"single","qid":"S623","id":623,"question":"新时代“五位一体”总体布局是一个有机整体，其根本是（    ）","options":{"A":"经济建设","B":"政治建设","C":"文化建设","D":"生态建设"},"answer":"A"},{"type":"single","qid":"S624","id":624,"question":"中国特色社会主义的开创与接续发展的主要矛盾是（    ）","options":{"A":"“人民的需要”和“工业化要求”的主要矛盾","B":"“社会主义道路”和“资本主义道路”的主要矛盾","C":"“人民的需要”和“落后生产”的主要矛盾","D":"“美好生活需要”和“不平衡不充分发展”的主要矛盾"},"answer":"D"},{"type":"single","qid":"S625","id":625,"question":"中共十一届三中全会后，中国农村在经济体制改革中推行的制度是（   ）","options":{"A":"个体经营制度","B":"互助合作制度","C":"家庭联产承包责任制度","D":"生产队为基础的集体经营制度"},"answer":"C"},{"type":"single","qid":"S626","id":626,"question":"“四个全面”战略布局是指（    ）","options":{"A":"全面建设小康社会、全面深化改革、全面依法治国、全面整顿党的作风","B":"全面对外开放、全面深化改革、全面依法治国、全面整顿党的作风","C":"全面建设小康社会、全面深化改革、全面实现民主、全面从严治党","D":"全面建设小康社会、全面深化改革、全面依法治国、全面从严治党"},"answer":"D"},{"type":"single","qid":"S627","id":627,"question":"党的十九大报告对我国社会主要矛盾作了新的规范表述：我国社会主要矛盾已经转化为人民日益增长的美好生活的需要和不平衡不充分的发展之间的矛盾。人民美好生活需要日益广泛，不仅对物质文化生活提出了更高要求，而且在民主、法治等方面的要求日益增长。同时，我国社会生产力水平总体上显著提高，更加突出的问题是（   )","options":{"A":"落后的社会生产","B":"发展的不平衡不充分问题","C":"人民的美好需要","D":"经济文化发展不平衡不充分"},"answer":"B"},{"type":"single","qid":"S628","id":628,"question":"习近平新时代中国特色社会主义思想，是党和人民实践经验和集体智慧的结晶，主要创立者是作为党中央的核心、全党的核心的习近平同志。习近平新时代中国特色社会主义思想的核心要义是（   )","options":{"A":"坚持全心全意为人民服务","B":"坚持改革开放","C":"坚持走在时代前列","D":"坚持和发展中国特色社会主义"},"answer":"D"},{"type":"single","qid":"S629","id":629,"question":"我国发展步人近代以来的最好时期，正处于实现中华民族伟大复兴的关键时期。新中国成立以来特别是改革开放以来，我国社会生产力、综合国力、人民生活水平实现了历史性跨越，经济实力、科技实力、国防实力进入世界前列。实现中华民族伟大复兴的中国梦的根本保证是（   )","options":{"A":"中国特色社会主义制度","B":"生产力的进步","C":"中国共产党的领导","D":"人民当家做主"},"answer":"C"},{"type":"single","qid":"S630","id":630,"question":"党的十九大报告指出，中国特色社会主义进入新时代，我国社会的主要矛盾已经转化为（   )","options":{"A":"人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾","B":"人民日益增长的物质文化需要同落后的社会生产之间的矛盾","C":"人民对于建立先进的工业国的要求同落后的农业国的现实之间的矛盾","D":"人民对于经济文化迅速发展的需要同当前经济文化不能满足人民需要的状况之间的矛盾"},"answer":"A"},{"type":"single","qid":"S631","id":631,"question":"习近平总书记说过，江山就是人民、人民就是江山，打江山、守江山，守的是人民的心。中国共产党根基在人民、血脉在人民、力量在人民。习近平新时代中国特色社会主义思想，彰显和贯穿着坚定的理想信念、真挚的人民情怀、高度的自觉自信、无畏的担当精神、科学的思想方法。 这一思想始终坚持的奋斗目标是（   )","options":{"A":"建设工业强国","B":"实现中华民族伟大复兴","C":"建设社会主义现代化强国","D":"人民对美好生活的向往"},"answer":"D"},{"type":"single","qid":"S632","id":632,"question":"习近平新时代中国特色社会主义思想深刻回答了新时代坚持和发展中国特色社会主义的总目标、总任务、总体布局、战略布局和发展方向、发展方式、发展动力、战略步骤、外部条件、政治保证等基本问题。在习近平新时代中国特色社会主义思想的主要内容中，最重要、最核心的内容是（   ）","options":{"A":"坚持人民至上","B":"“八个明确”","C":"“十四个坚持”","D":"坚持和完善中国特色社会主义制度"},"answer":"B"},{"type":"single","qid":"S633","id":633,"question":"中国特色社会主义源自于中华民族5000多年的文明，植根于近代以来中国人民和中华民族为实现民族独立、人民解放和国家富强、人民幸福的奋斗历程，是建成社会主义现代化强国、实现中华民族伟大复兴的必由之路。实现民族复兴，关键在（   ）","options":{"A":"党的领导","B":"坚持和发展中国特色社会主义制度","C":"大力发展生产力","D":"人民当家做主"},"answer":"A"},{"type":"single","qid":"S634","id":634,"question":"“四个伟大”是习近平总书记于2017年10月18日在十九大报告中提出的治国理政方针理论。伟大斗争，伟大工程，伟大事业，伟大梦想，紧密联系、相互贯通、相互作用，其中起决定性作用的是（   ）","options":{"A":"伟大工程","B":"伟大梦想","C":"伟大斗争","D":"伟大事业"},"answer":"A"},{"type":"single","qid":"S635","id":635,"question":"党的十八大以来，我们党坚持以马克思列宁主义、毛泽东思想、邓小平理论、“三个代表，重要思想、科学发展观为指导，坚持解放思想、实事求是、与时俱进、求真务实，坚持辩证唯物主义和历史唯物主义，以全新的视野深化对共产党执政规律、社会主义建设规律、人类社会发展规律的认识，取得重大理论创新成果，形成了习近平新时代中国特色社会主义思想。这一思想系统回答了（   ）","options":{"A":"什么是社会主义、怎样建设社会主义","B":"建设什么样的党、怎样建设党","C":"实现什么样的发展、怎样发展","D":"新时代坚持和发展什么样的中国特色社会主义、怎样坚持和发展中国特色社会主义"},"answer":"D"},{"type":"single","qid":"S636","id":636,"question":"抗击新冠肺炎疫情，是对我国国家治理体系和治理能力的一次大考。经过艰苦卓绝的努力，疫情防控阻击战取得重大战略成果。我们党坚持生命至上，调集全国最优秀的医生、最先进的设备、最急需的资源，全力以赴投入疫病救治，救治费用全部由国家承担，最大程度提高检测率、治愈率，最大程度降低感染率、病亡率。这体现了习近平新时代中国特色社会主义思想的特质是（   ）","options":{"A":"坚持一切从实际出发来研究和解决问题，坚持理论联系实际来制定和形成指导实践发展的正确路线方针政策，坚持在实践中检验真理和发展真理","B":"彰显历史自觉，从历史、现实、未来的贯通中把握历史规律和发展趋势","C":"坚持以人民为中心，坚持人民主体地位，把人民对美好生活的向往作为奋斗目标，把党的群众路线贯彻到治国理政全部活动之中","D":"突出问题导向，聚焦我国发展和我们党执政面临的重大理论和实践问题，把化解矛盾、破解难题作为打开局面的突破口"},"answer":"C"},{"type":"single","qid":"S637","id":637,"question":"中国梦是国家的梦、民族的梦，也是每一个中国人的梦。“民惟邦本，本固邦宁”，国家的富强、民族的振兴都要以人民的权利得到保障、利益得到实现、幸福得到满足为条件。因此，国家富强、民族振兴的根本出发点和落脚点是（   ）","options":{"A":"人民幸福","B":"政治民主","C":"社会和谐","D":"经济发达"},"answer":"A"},{"type":"single","qid":"S638","id":638,"question":"党的十九大报告指出，新时代中国特色社会主义思想，明确坚持和发展中国特色社会主义，在全面建成小康社会的基础上，分两步走在21世纪中叶建成富强民主文明和谐美丽的社会主义现代化强国。其中，总任务是（   ）","options":{"A":"解放和发展社会生产力","B":"实现社会主义现代化和中华民族伟大复兴","C":"建成社会主义现代化强国","D":"坚持发展才是硬道理"},"answer":"B"},{"type":"single","qid":"S639","id":639,"question":"习近平总书记强调：“坚持共享发展，必须坚持发展为了人民、发展依靠人民、发展成果由人民共享，作出更有效的制度安排，使全体人民在共建共享发展中有更多获得感，增强发展动力，增进人民团结，朝着共同富裕方向稳步前进。”因此，共享是（   ）","options":{"A":"中国特色社会主义的本质属性","B":"中国特色社会主义最本质的特征","C":"持续健康发展的内在要求","D":"中国特色社会主义的本质要求"},"answer":"D"},{"type":"single","qid":"S640","id":640,"question":"党的十九届五中全会审议通过了《中共中央关于制定国民经济和社会发展第十四个五年规划和二○三五年远景目标的建议》(简称《建议》)。该《建议》指出，坚持创新驱动发展，全面塑造发展新优势，就是要（   ）","options":{"A":"把对外开放作为国家的基本国策","B":"把关键核心技术攻坚战作为突破口","C":"把科技自立自强作为国家发展的战略支撑","D":"把全面深化改革作为重要动力"},"answer":"C"},{"type":"single","qid":"S641","id":641,"question":"中华人民共和国成立以来，我们党领导人民创造了世所罕见的两大奇迹。这就是（   ）","options":{"A":"经济快速发展奇迹和生态环境改善奇迹","B":"文化繁荣兴盛奇迹和社会长期稳定奇迹","C":"文化繁荣兴盛奇迹和生态环境改善奇迹","D":"经济快速发展奇迹和社会长期稳定奇迹"},"answer":"D"},{"type":"single","qid":"S642","id":642,"question":"中国梦，是中国共产党第十八次全国代表大会召开以来，习近平总书记所提出的重要指导思想和重要执政理念，正式提出于2012年11月29日。习总书记把“中国梦”定义为“实现中华民族伟大复兴，就是中华民族近代以来最伟大梦想”，并且表示这个梦“一定能实现\"。中国梦的最大特点，就是（   ）","options":{"A":"把中国和世界作为一个命运共同体","B":"把国家、民族和个人作为一个命运共同体","C":"把中华民族的昨天、今天和明天作为一个命运共同体","D":"把中国梦的目标与实现途径作为一个命运共同体"},"answer":"B"},{"type":"single","qid":"S643","id":643,"question":"党的十九大，是在全面建成小康社会决胜阶段、中国特色社会主义发展关键时期召开的一次十分重要的大会，承担着谋划决胜全面建成小康社会、深入推进社会主义现代化建设的重大任务，事关党和国家事业继往开来，事关中国特色社会主义前途命运，事关最广大人民根本利益。党的十九大报告指出，中国特色社会主义进人新时代，我国社会主要矛盾已经转化为（   ）","options":{"A":"人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾","B":"人民日益增长的物质文化需要同落后的社会生产之间的矛盾","C":"人民对于建立先进的工业国的要求同落后的农业国的现实之间的矛盾","D":"人民对于经济文化迅速发展的需要同当前经济文化不能满足人民需要的状况之间的矛盾"},"answer":"A"},{"type":"single","qid":"S644","id":644,"question":"党的十九大报告明确指出，从2020年到本世纪中叶可以分两个阶段来安排。第一个阶段的奋斗目标是（   ）","options":{"A":"实现共同富裕","B":"全面实现社会主义现代化","C":"基本实现社会主义现代化","D":"实现国家治理体系和治理能力现代化"},"answer":"C"},{"type":"single","qid":"S645","id":645,"question":"共同富裕是社会主义的本质要求,是中国式现代化的重要特征。党的十九届五中全会对扎实推动共同富裕作出重大战略部署,明确提出了推进共同富裕的2035年远景目标。这一目标是（   ）","options":{"A":"全体人民共同富裕基本实现","B":"全体人民共同富裕取得更为明显的实质性进展","C":"全体人民共同富裕全面实现","D":"全体人民共同富裕同步实现"},"answer":"B"},{"type":"single","qid":"S646","id":646,"question":"四个全面”战略布局是党坚持和发展中国特色社会主义的新实践新成果，是对党治国理政经验的科学总结和丰富发展，集中体现了时代和实践发展对党和国家工作的新要求，是实现中华民族伟大复兴的中国梦、续写中国特色社会主义新篇章的行动纲领。“四个全面”战略布局形成的最深刻根据是（   ）","options":{"A":"社会主义市场经济的必然选择","B":"问题意识和人民情怀","C":"建设中国特色社会主义总体布局的内在要求","D":"社会主义初级阶段主要矛盾"},"answer":"B"},{"type":"single","qid":"S647","id":647,"question":"当前，我国发展还面临一系列突出矛盾和挑战，前进道路上还有不少困难和问题。解决中国现实问题的根本途径是（   ）","options":{"A":"全面建成小康社会","B":"全面依法治国","C":"全面深化改革","D":"全面从严治党"},"answer":"C"},{"type":"single","qid":"S648","id":648,"question":"新时代党的建设目的、方针、主线、总体布局和目标，紧密联系、相互作用、相互促进，共同构成了新时代党的建设科学有机的整体：新时代党的建设的根本方针是（   ）","options":{"A":"群众路线","B":"为人民服务","C":"坚持党要管党、全面从严治党","D":"以党的政治建设为主"},"answer":"C"},{"type":"single","qid":"S649","id":649,"question":"中国特色社会主义进入新时代，我们党一定要有新气象新作为。打铁必须自身硬。党要团结带领人民进行伟大斗争、推进伟大事业、实现伟大梦想，必须毫不动摇坚持和完善党的领导，毫不动摇把党建设得更加坚强有力。全面深化改革的总目标是（   ）","options":{"A":"发展社会主义市场经济","B":"完善和发展中国特色社会主义制度，推进国家治理体系和治理能力现代化","C":"巩固社会主义制度","D":"实现中华民族伟大复兴"},"answer":"B"},{"type":"single","qid":"S650","id":650,"question":"党的十九大报告提出的新时代党的建设总要求，明确了新时代党的建设的根本方针：坚持党要管党、全面从严治党。全面从严治党，要害是（   ）","options":{"A":"“全面”","B":"“严”","C":"“治”","D":"“党要管党”"},"answer":"C"},{"type":"single","qid":"S651","id":651,"question":"党的十九大报告提出了新时代党的建设总要求，把党的政治建设作为统领。政治建设的首要任务是（   ）","options":{"A":"保证全党服从中央，坚持党中央权 威和集中统一领导","B":"增强党内政治生活的政治性、时代性、原则性、战斗性","C":"完善和落实民主集中制的各项制度","D":"全心全意为人民服务"},"answer":"A"},{"type":"single","qid":"S652","id":652,"question":"进入新时代，我们党面临的执政环境是复杂的，影响党的先进性、弱化党的纯洁性的因素也是复杂的，党内存在的思想不纯、组织不纯、作风不纯等突出问题尚未得到根本解决。党面临的执政考验、改革开放考验、市场经济考验、外部环境考验具有长期性和复杂性，党面临的精神懈怠危险、能力不足危险、脱离群众危险、消极腐败危险具有尖锐性和严峻性。推进党的建设新的伟大工程要一以贯之，中共十九大首次纳入党的建设总体布局并摆在首位的是（   ）","options":{"A":"思想建设","B":"政治建设","C":"组织建设","D":"作风建设"},"answer":"B"},{"type":"single","qid":"S653","id":653,"question":"下列关于“四个全面”战略布局说法，错误的是（   ）","options":{"A":"全面小康指覆盖的人口要全面，是惠及全体人民的小康","B":"坚持人民在全面依法治国中主体地位是社会主义法治最根本的保证","C":"全面深化改革，关系党和人民事业前途命运，关系党的执政基础和执政地位","D":"坚持党要管党、全面从严治党是新时代党的建设的根本方针"},"answer":"B"},{"type":"single","qid":"S654","id":654,"question":"党的十九大报告指出，科学立法、严格执法、公正司法、全民守法深入推进，法治国家、法治政府、法治社会建设相互促进，中国特色社会主义法治体系日益完善，全社会（   ）明显增强","options":{"A":"法治水平","B":"法治意识","C":"法治理念","D":"法治观念"},"answer":"D"},{"type":"single","qid":"S655","id":655,"question":"依法治国是党领导人民治理国家的（   ）","options":{"A":"根本保证","B":"基本保证","C":"根本方式","D":"基本方略"},"answer":"D"},{"type":"single","qid":"S656","id":656,"question":"我国经济已由高速增长阶段转向高质量发展阶段，正处在转变发展方式、优化经济结构、转换增长动力的攻关期。建设现代化经济体系是跨越关口的迫切要求和我国发展的战略目标。坚持质量第一、效益优先，推动经济发展质量变革、效率变革、动力变革，提高全要素生产率，其主线就是（  ）","options":{"A":"创新驱动发展战略","B":"乡村振兴战略","C":"供给侧结构性改革","D":"区域协调发展战略"},"answer":"C"},{"type":"single","qid":"S657","id":657,"question":"习近平指出，建设现代化经济体系，需要扎实管用的政策举措和行动。建设现代化经济体系，首先就是要大力发展实体经济，筑车现代化经济体系的坚实基础。全面提升实体经济，重点是（  ）","options":{"A":"加快发展先进制造业","B":"推进中国制造向中国创造转变","C":"实施创新驱动发展战略","D":"支持传统产业优化升级"},"answer":"A"},{"type":"single","qid":"S658","id":658,"question":"社会主义初级阶段的基本经济制度是公有制为主体、多种所有制经济共同发展。必须毫不动摇地巩固和发展公有制经济，必须毫不动摇地鼓励、支持和引导非公有制经济发展。对我国经济发展起主导作用的是（  ）","options":{"A":"公有制经济","B":"国有经济","C":"民营经济","D":"非公有制经济"},"answer":"B"},{"type":"single","qid":"S659","id":659,"question":"习近平在主持中央政治局集体学习时强调：“在市场作用和政府作用的问题上，要讲辩证法、两点论，‘看不见的手，和‘看得见的手，都要用好，努力形成市场作用和政府作用有机统一、相互补充、相互协调、相互促进的格局，推动经济社会持 续健康发展。” “看不见的手”和“看得见的手”实际上指的是（  ）","options":{"A":"资源配置的不同方式","B":"经济制度的表现形式","C":"生产关系的具体范畴","D":"分配方式的主要类型"},"answer":"A"},{"type":"single","qid":"S660","id":660,"question":"英国伦敦经济与商业政策署原署长罗思义指出：“美式民主”并非完美。美国一直宣扬其政治体制以人人平等为基础，即“一人一票。然而，这一体制实际上却受到金钱的支配。美国政治体系的本质并非“—人一票”，而是由财富主导，其选举也受资金支持的左右。相对而言，中国特色社会主义民主是真正的民主，其本质和核心要求是（  ）","options":{"A":"中国共产党的领导","B":"人民当家作主","C":"依法治国","D":"国家治理能力现代化"},"answer":"B"},{"type":"single","qid":"S661","id":661,"question":"实践证明，民族区域自治制度是适合民族地区特点，具有中国特色的一项基本政治制度。民族区域自治制度的核心是（   ）","options":{"A":"坚持党对少数民族地区的领导","B":"实现各民族平等、团结和共同繁荣","C":"充分尊重和保护各族群众宗教信仰自由","D":"保障少数民族当家作主、管理本民族地方事务的权力"},"answer":"D"},{"type":"single","qid":"S662","id":662,"question":"习近平强调，“要完善基层群众自治机制，调动城乡群众、企事业单位、社会组织自主自治的积极性，打造人人有责、人人尽责的社会治理共同体”。这说明，当代 中国最直接、最广泛、最生动的民主实践是（  ）","options":{"A":"基层群众自治","B":"民族区域自治","C":"城市社区自治","D":"村民自治"},"answer":"A"},{"type":"single","qid":"S663","id":663,"question":"中国特色社会主义政治发展道路，是近代以来中国人民长期奋斗历史逻辑、理论逻辑、实践设辑的必然结果，是坚持党的本质属性、践行党的根本宗旨的必然要求。坚持党的领导、人民当家作主、依法治国有机统一的根本政治制度安排是（  ）","options":{"A":"人民民主专政","B":"人民代表大会制度","C":"民族区域自治制度","D":"中国共产党领导的多党合作和政治协商制度"},"answer":"B"},{"type":"single","qid":"S664","id":664,"question":"2021年1月，习近平在全国政协新年茶话会上的讲话中指出，人民政协坚持中国共产党对政协工作的全面领导，坚持团结和民主两大主题，履职尽责，凝心聚力，为党和国家事业发展作出了重要贡献。人民政协是（  ）","options":{"A":"我国的一项基本政治制度","B":"社会主义协商民主的重要渠道和专门协商机构","C":"重要的国家机关","D":"中国社会主义民主政治的特有形式和独特优势"},"answer":"B"},{"type":"single","qid":"S665","id":665,"question":"实行人民民主，保证人民当家作主，要求治国理政大政方针在人民内部各方面进行广泛商量。中国社会主义民主政治的特有形式和独特优势是（  ）","options":{"A":"党的领导","B":"团结和民主","C":"协商民主","D":"民主监督"},"answer":"C"},{"type":"single","qid":"S666","id":666,"question":"改善民生的前提是","options":{"A":"经济发展","B":"政治发展","C":"社会发展","D":"生态文明"},"answer":"A"},{"type":"single","qid":"S667","id":667,"question":"改善民生要从（  ）入手。","options":{"A":"解决好人民群众的主要矛盾","B":"解决好人民群众普遍关心的突出问题","C":"解决好人民群众的普遍需求","D":"提高人民群众的生活水平"},"answer":"B"},{"type":"single","qid":"S668","id":668,"question":"民族复兴的基础工程是","options":{"A":"建设科技强国","B":"建设经济强国","C":"建设教育强国","D":"建设美丽中国"},"answer":"C"},{"type":"single","qid":"S669","id":669,"question":"()是最大的民生工程。","options":{"A":"教育","B":"就业","C":"科技","D":"生态"},"answer":"B"},{"type":"single","qid":"S670","id":670,"question":"()是改善民生、实现发展成果由人民共享最重要最直接的方式。","options":{"A":"经济增长","B":"提高劳动报酬","C":"收入分配","D":"缓解结构性矛盾"},"answer":"C"},{"type":"single","qid":"S671","id":671,"question":"社会保障需坚持","options":{"A":"改革社会保险制度","B":"改革社会救助和慈善制度","C":"城乡统一","D":"应保尽保"},"answer":"D"},{"type":"single","qid":"S672","id":672,"question":"民族昌盛和国家富强的重要标志是","options":{"A":"人民健康长寿","B":"劳动报酬提高","C":"统筹城乡","D":"劳动生产率提高"},"answer":"A"},{"type":"single","qid":"S673" 义文化发展道路"},"answer":"D"},{"type":"single","qid":"S743","id":743,"question":"（   ）是更基础、更广泛、更深厚的自信，是一个国家、一个民族发展中更基本、更深沉、更持久的力量。","options":{"A":"制度自信","B":"理论自信","C":"道路自信","D":"文化自信"},"answer":"D"},{"type":"single","qid":"S744","id":744,"question":"（   ）集中体现了一个国家基于文化而具有的凝聚力和生命力，以及由此产生的吸引力和影响力。","options":{"A":"文化软实力","B":"文化硬实力","C":"文化产业","D":"文化事业"},"answer":"A"},{"type":"single","qid":"S745","id":745,"question":"2021年2月25日，全国脱贫攻坚总结表彰大会在北京人民大会堂隆重举行。习近平指出，脱贫攻坚取得举世瞩目的成就，靠的是党的坚强领导，靠的是中华民族自力更生、艰苦奋斗的精神品质，靠的是新中国成立以来特别是改革开放以来积累的坚实物质基础，靠的是一任接着一任干的坚守执着，靠的是全党全国各族人民的团结奋斗。我国脱贫攻坚取得的巨大成就是","options":{"A":"区域性整体贫困得到解决，完成了消除绝对贫困的艰巨任务","B":"贫困县全部摘帽，实现了共同富裕","C":"解决了发展不平衡不充分问题，缩小了城乡区域发展差距","D":"实现了人的全面发展，人均收人水平大幅提高"},"answer":"A"},{"type":"single","qid":"S746","id":746,"question":"全面深化改革，是顺应当今世界发展大势的必然选择，是解决中国现实问题的根本途径，是抓住和用好历史性机遇，抢占未来发展制高点的必然选择。全面深化改革的总目标是","options":{"A":"促进社会公平正义，让改革发展成果更多更公平惠及全体人民","B":"坚持经济体制政革，坚持“一个中心、两个基本点”","C":"进一步解放和发展社会生产力","D":"完善和发展中国特色社会主义制度、推进国家治理体系和治理能力现代化"},"answer":"D"},{"type":"single","qid":"S747","id":747,"question":"习近平指出，改革开放是一场深刻革命，必须沿着正确道路推进。中国经济体制改革，应该根据本国国情发展，坚定深化改革的信心、坚持深化改革的正确方向、凝聚深化改革的共识。所以，经济体制改革的基本遵循是","options":{"A":"坚持社会主义市场经济改革方向","B":"坚持增进人民福祉","C":"坚持改革沿着中国特色社会主义方向前进","D":"坚持党对改革的集中统一领导"},"answer":"A"},{"type":"single","qid":"S748","id":748,"question":"完善和发展中国特色社会主义制度，推进国家治理体系和治理能力现代化，这两句话是一个整体，前一句规定了根本方向，后一句规定了实现路径，我们是在中国特色社会主义道路这个方向上推进国家治理体系和治理能力现代化。推进国家治理体系和治理能力现代化，是完善和发展中国特色社会主义制度的必然要求，是实现社会主义现代化的应有之义。下列关于国家治理体系与治理能力关系表述正确的是","options":{"A":"治理能力是起根本性、全局性、长远性作用的","B":"国家治理体系越完善，国家治理能力越强","C":"没有有效的治理能力，再好的制度也难以发挥作用","D":"二者在资源配置中起决定性作用"},"answer":"C"},{"type":"single","qid":"S749","id":749,"question":"全面深化改革是在坚持社会主义基本制度的前提下，改革与社会生产力发展不相适应的各种管理体制，是社会主义制度的自我完善和自我发展。改革开放是前无古人的崭新事业，必须坚持正确的方法论，在不断实践探索中推进。全面深化改革中，富有中国特色、符合中国国情的改革方法是","options":{"A":"注重系统性、整体性、协同性","B":"坚持效率优先、兼顾公平","C":"胆子要大、步子要稳","D":"加强顶层设计和摸着石头过河相结合"},"answer":"D"},{"type":"single","qid":"S750","id":750,"question":"“一带一路”成为经济复苏“大引擎”。在疫情蔓延大背景下，中国对“一带一路”沿线国家非金融类直接投资达130.2亿美元，同比增长29.7%。共建“一带一路”正在为盘活地区经济循环和世界经济复苏持续注人中国动力。共建“一带一路”不仅为世界各国发展提供了新机遇，也为中国开放发展开辟了新天地。实现国家繁荣富强的根本出路是","options":{"A":"创新发展","B":"全面开放","C":"推进供给侧结构性改革","D":"发展社会主义市场经济"},"answer":"B"},{"type":"single","qid":"S751","id":751,"question":"2021年4月，中共中央办公厅、国务院办公厅印发《关于加强社会主义法治文化建设的意见》指出，社会主文法治文化是中国特色社会主义文化的重要组成部分，是社会主义法治国家建设的重要支撑。建设中国特色社会主义法治体系，首先是要","options":{"A":"建设中国特色社会主义法治体系，建设社会主义法治国家","B":"坚持和加强党的领导","C":"加强法治专门队伍和法律服务队伍建设","D":"完善以宪法为核心的中国特色社会主义法律体系"},"answer":"D"},{"type":"single","qid":"S752","id":752,"question":"法律是治国之重器，良法是善治之前提。全面依法治国是关系我们党执政兴国、人民幸福安康、党和国家长治久安的重大战略问题，是“四个全面”战略布局的重要组成部分。全面依法治国的总目标是","options":{"A":"必须坚持党领导立法、保证执法、支持司法、带头守法","B":"将依法治国和以德治国相结合","C":"科学立法、严格执法、公正司法、全民守法","D":"建设中国特色社会主义法治体系，建设社会主义法治国家"},"answer":"D"},{"type":"single","qid":"S753","id":753,"question":"实现中华民族伟大复兴是近代以来中华民族最伟大的梦想。新时代中国共产党的历史使命，就是统揽伟大斗争、伟大工程、伟大事业、伟大梦想，在全面建成小康社会的基础上全面建成社会主义现代化强国，实现中华民族伟大复兴。在中国特色社会主义实践中，可以激发前进动力的是","options":{"A":"伟大工程","B":"伟大斗争","C":"伟大事业","D":"伟大梦想"},"answer":"B"},{"type":"single","qid":"S754","id":754,"question":"习近平指出，党内存在的很多问题，原因都是党的政治建设没有抓紧、没有抓实、没有抓好。要解决当前党内存在的突出矛盾和问题，必须把党的政治建设摆在首位，营造风清气正的政治生态。党的政治建设的首要任务是B.坚定执行党的政治路线","options":{"A":"坚持党中央权威和集中统一领导","B":"坚定执行党的政治路线","C":"提高政治觉悟和政治能力","D":"严肃党内政治生活，强化党内监督"},"answer":"A"},{"type":"single","qid":"S755","id":755,"question":"党对军队绝对领导的根本原则和制度，发端于（）","options":{"A":"南昌起义","B":"三湾改编","C":"古田会议","D":"遵义会议"},"answer":"A"},{"type":"single","qid":"S756","id":756,"question":"党对军队绝对领导的根本原则和制度，奠基于（）","options":{"A":"南昌起义","B":"三湾改编","C":"古田会议","D":"遵义会议"},"answer":"B"},{"type":"single","qid":"S757","id":757,"question":"“明者防祸于未萌，智者图患于将来。（  ）是防范风险的前提。","options":{"A":"把握风险","B":"应对风险","C":"预判风险","D":"化解风险"},"answer":"C"},{"type":"single","qid":"S758","id":758,"question":"“一国两制”前提是（  ）","options":{"A":"国家主权统一于中华人民共和国","B":"台港澳实行高度自治","C":"大陆实行社会主义制度","D":"台港澳资本主义制度不变"},"answer":"A"},{"type":"single","qid":"S759","id":759,"question":"“一国两制”最初是针对（  ）问题提出。","options":{"A":"香港","B":"澳门","C":"台湾","D":"港澳台"},"answer":"C"},{"type":"single","qid":"S760","id":760,"question":"香港特别行政区政府行政长官是（  ）","options":{"A":"由中央人民政府委派","B":"由香港本地选举产生","C":"由香港本地人协商产生","D":"由香港人选举产生并由中央人民政府任命"},"answer":"D"},{"type":"single","qid":"S761","id":761,"question":"总体国家安全观关键在（  ）。","options":{"A":"国家","B":"安全","C":"总体","D":"国家安全"},"answer":"C"},{"type":"single","qid":"S762","id":762,"question":"同国家现代化进程相一致，力争到（）年基本实现国防和军队现代化。","options":{"A":"2027","B":"2035","C":"本世纪中叶","D":"2020"},"answer":"B"},{"type":"single","qid":"S763","id":763,"question":"加强军队建设，（  ）是核心，反映军队的根本职能和军队建设的根本指向。","options":{"A":"听党指挥","B":"能打胜仗","C":"优良作风","D":"为人民服务"},"answer":"B"},{"type":"single","qid":"S764","id":764,"question":"（  ）是人民军队的立军之本。","options":{"A":"政治立军","B":"改革强军","C":"科技强军","D":"依法治军"},"answer":"A"}],"m":[{"type":"multi","qid":"M1","id":1,"question":"“两个凡是”（即“凡是毛主席作出的决策，我们都坚决维护，凡是毛主席的指示，我们都始终不渝地遵循。”的错误和危害是（       ）。","options":{"A":"没有正确区分毛泽东思想和毛泽东晚年的错误。","B":"没能完整准确地理解和掌握毛泽东思想的精神实质。","C":"不可能改变人们在“文革”中形成的僵化的思想状态。","D":"不可能在其指导下开创社会主义建设的新局面"},"answer":"ABCD"},{"type":"multi","qid":"M2","id":2,"question":"改革开放以来的我国政治生活中的两个“解放思想、实事求是的宣言书”是指（       ）。","options":{"A":"1978年中央工作会议上邓小平的讲话《解放思想，实事求是，团结一致向前看》","B":"1982年邓小平在十二大提出的“走自己的道路，建设有中国特色社会主义”","C":"1984年中共十二届三中全会提出的社会主义商品经济理论","D":"1992年邓小平在武昌、深圳、上海等地发表的《南方谈话》"},"answer":"AD"},{"type":"multi","qid":"M3","id":3,"question":"实事求是是马克思主义中国化理论的精髓，这是因为（       ）。","options":{"A":"毛泽东在延安时为中央党校题了“实事求是”四个大字","B":"它体现在马克思主义中国化两大理论成果基本内容的各个方面","C":"它是中国革命和现代化建设取得胜利的思想武器","D":"它是渗透于马克思主义中国化两大理论成果的方法论原则"},"answer":"BCD"},{"type":"multi","qid":"M4","id":4,"question":"解放思想和实事求是的关系是（       ）。","options":{"A":"解放思想是实事求是的前提条件","B":"实事求是是解放思想的目的归宿","C":"解放思想和实事求是统一于社会实践","D":"解放思想和实事求是是相互矛盾的"},"answer":"ABC"},{"type":"multi","qid":"M5","id":5,"question":"党的思想路线的基本内容是（       ）。","options":{"A":"一切从实际出发，理论联系实际","B":"实事求是","C":"在实践中检验真理和发展真理","D":"相信群众，依靠群众"},"answer":"ABC"},{"type":"multi","qid":"M6","id":6,"question":"先后对毛泽东思想的科学含义做出概括的文献是（       ）。","options":{"A":"毛泽东的《中国革命和中国共产党》一文","B":"刘少奇在党的七大上作的《关于修改党章的报告》","C":"党的十一届六中全会通过的《关于建国以来党的若干历史问题的决议》","D":"党的十二大通过的党章"},"answer":"BC"},{"type":"multi","qid":"M7","id":7,"question":"坚持实事求是的思想路线，必须自觉地把思想认识（       ）。","options":{"A":"从那些不合时宜的观念、做法和体制的束缚中解放出来","B":"从对马克思主义的错误的和教条式的理解中解放出来","C":"从主观主义和形而上学的桎梏中解放出来","D":"从地方保护主义的落后意识和狭隘利益中解放出来"},"answer":"ABC"},{"type":"multi","qid":"M8","id":8,"question":"邓小平强调，解放思想是在马克思主义的指导下，打破（       ）的束缚，研究新情况，解决新问题。","options":{"A":"习惯势力","B":"主观偏见","C":"马克思主义的错误","D":"教条式理论"},"answer":"AB"},{"type":"multi","qid":"M9","id":9,"question":"确立实事求是的思想路线对于中国革命和建设的重要意义是（       ）。","options":{"A":"马克思主义认识论在马克思主义中国化实践过程中的的运用、丰富和发展(去掉一个“的”)","B":"加强党的思想作风建设和提高领导能力的重要内容","C":"开辟建设有中国特色的社会主义事业的根本保证","D":"制定并贯彻执行正确的政治路线的思想基础"},"answer":"ABCD"},{"type":"multi","qid":"M10","id":10,"question":"邓小平理论是（       ）。","options":{"A":"马克思主义基本原理与当代中国实践和时代特征相结合的产物","B":"毛泽东思想的继承与发展","C":"全党和全国人民集体智慧的结晶","D":"邓小平留给中国人民的最宝贵的遗产"},"answer":"ABCD"},{"type":"multi","qid":"M11","id":11,"question":"与时俱进就是党的全部理论和工作要（       ）。","options":{"A":"体现时代性","B":"把握规律性","C":"富于创造性","D":"坚持人民性"},"answer":"ABC"},{"type":"multi","qid":"M12","id":12,"question":"马克思主义中国化的一系列理论成果，代表着中国最广大人民在不同历史时期的意志和愿望，是（       ）。","options":{"A":"中华民族优秀文化的结晶","B":"凝聚党心民心的强大精神力量","C":"中华民族智慧的最高表现和马克思主义理论的最新最高概括","D":"党最可宝贵的精神财富"},"answer":"ABD"},{"type":"multi","qid":"M13","id":13,"question":"中国革命、建设和改革的实践证明，马克思主义之所以能在中国发挥指导作用，是因为（       ）。","options":{"A":"它是科学、是正确的方法","B":"它满足了中国革命、建设和改革的需要","C":"它同中国人民的革命、建设和改革的实践发生了联系，实现了结合","D":"它通过中国化而为中国人民所掌握"},"answer":"ABCD"},{"type":"multi","qid":"M14","id":14,"question":"在理论与实际的关系上，中国共产党在历史上曾经出现过的错误倾向有（       ）。","options":{"A":"照搬照抄马克思主义理论的教条主义","B":"轻视科学理论指导作用的狭隘经验主义","C":"以理论和实际相脱节为基本特征的主观主义","D":"盲目服从上级的绝对服从主义"},"answer":"ABC"},{"type":"multi","qid":"M15","id":15,"question":"马克思主义的中国化，从理论创新方面讲，就是（       ）。","options":{"A":"实现马克思主义的时代化","B":"实现马克思主义的实用化","C":"实现马克思主义的民族化","D":"实现马克思主义的大众化"},"answer":"AC"},{"type":"multi","qid":"M16","id":16,"question":"科学发展观是（       ）提出来的。"," ","C":"创造性","D":"实效性"},"answer":"ABCD"},{"type":"multi","qid":"M252","id":252,"question":"在“全面建成小康社会”中，“全面”的含义有（        ）。","options":{"A":"经济持续健康发展，人民民主不断扩大","B":"资源节约型、环境友好型社会建设取得重大进展","C":"文化软实力显著增强","D":"人民生活水平全面提高"},"answer":"ABCD"},{"type":"multi","qid":"M253","id":253,"question":"从性质定位看，“四个全面”是（     　）。","options":{"A":"治国理政的战略布局","B":"现代化建设的总体方略","C":"民族复兴的行动纲领","D":"发展中国特色社会主义的集中体现"},"answer":"ABCD"},{"type":"multi","qid":"M254","id":254,"question":"党的执政地位不是一劳永逸的，我党当前面临的危险有（  　）。","options":{"A":"精神懈怠的危险","B":"能力不足的危险","C":"脱离群众的危险","D":"消极腐败的危险"},"answer":"ABCD"},{"type":"multi","qid":"M255","id":255,"question":"在全方位改革的过程中，需要协调好的关系有（         ）。","options":{"A":"解放思想和实事求是的关系","B":"顶层设计和摸着石头过河的关系","C":"胆子要大和步子要稳的关系","D":"整体推进和重点突破的关系"},"answer":"ABCD"},{"type":"multi","qid":"M256","id":256,"question":"对协商民主制度进行改革，下列措施中正确的有（　   　）。","options":{"A":"重点加强政党协商、政府协商、政协协商","B":"增强政府协商事项的规范性，增强协商的广泛性和针对性","C":"协商民主应规范化、制度化","D":"积极开展人大协商、人民团体协商、基层协商，社会组织协商"},"answer":"ABCD"},{"type":"multi","qid":"M257","id":257,"question":"坚定不移地全面深化改革的必要性在于（      ）。","options":{"A":"改革是一个国家、一个民族的生存发展之道","B":"全面深化改革，是顺应当今世界发展大势的必然选择","C":"全面深化改革，是解决中国现实问题的根本途径","D":"全面深化改革，关系到党和人民事业前途命运，关系党的执政基础和执政地位"},"answer":"ABCD"},{"type":"multi","qid":"M258","id":258,"question":"全面深化改革必须坚持（     ）。","options":{"A":"坚持党对改革的集中统一领导","B":"坚持改革沿着中国特色社会主义方向前进","C":"坚持改革往有利于维护社会公平正义、增进人民福祉方向前进","D":"坚持社会主义市场经济改革方向"},"answer":"ABCD"},{"type":"multi","qid":"M259","id":259,"question":"改革、发展、稳定的关系是（        ）。","options":{"A":"改革、发展、稳定是我国社会主义现代化建设的三个重要支点","B":"改革是经济社会发展的强大动力","C":"发展是解决一切经济社会问题的关键","D":"稳定是改革发展的前提"},"answer":"ABCD"},{"type":"multi","qid":"M260","id":260,"question":"处理好改革、发展、稳定的关系，需要（    ）。","options":{"A":"坚持把改革的力度、发展的速度和社会可承受的程度统一起来","B":"把改善人民生活作为正确处理改革、发展、稳定关系的结合点","C":"在保持社会稳定中推进改革发展","D":"通过改革发展促进社会稳定"},"answer":"ABCD"},{"type":"multi","qid":"M261","id":261,"question":"全面依法治国必须坚持厉行法治，推进（    ），推进中国特色社会主义法治体系建设，全面深化依法治国实践。","options":{"A":"科学立法","B":"严格执法","C":"公正司法","D":"全民守法"},"answer":"ABCD"},{"type":"multi","qid":"M262","id":262,"question":"党面临的（     ）具有尖锐性和严峻性。","options":{"A":"精神懈怠危险","B":"能力不足危险","C":"脱离群众危险","D":"消极腐败危险"},"answer":"ABCD"},{"type":"multi","qid":"M263","id":263,"question":"新时代党的建设的根本方针是（    ）。","options":{"A":"坚持党要管党、全面从严治党","B":"“全面”是基础","C":"“严”是关键","D":"“治”是要害"},"answer":"ABCD"},{"type":"multi","qid":"M264","id":264,"question":"在全面深化改革中，我国提出了一系列放活民间投资的普惠政策，如保障民企平等使用土地、减免税收，扩大民间投资在电网、电信、铁路等非竞争性领域的参与力度等。实施这些政策的目的是（  ）","options":{"A":"允许各种所有制经济实行企业员工持股","B":"鼓励所有民企建立现代企业制度","C":"保证各种所有制经济公开公平公正参与市场竞争","D":"保证各种所有制经济依法平等使用生产要素"},"answer":"CD"},{"type":"multi","qid":"M265","id":265,"question":"改革开放以来，党和国家实施大规模扶贫开发，是7亿农村贫困人口摆脱贫困，但是到2014年末，全国仍有7017万农村贫困人口。农村贫困人口脱贫是全面建成小康社会最艰巨的任务。为打赢脱贫攻坚战，党的十八届五中全会提出了精准扶贫、精准脱贫的基本方略，试试这一方略的主要举措有(  )","options":{"A":"社保政策兜底","B":"转移就业","C":"易地搬迁","D":"产业扶持"},"answer":"ABCD"},{"type":"multi","qid":"M266","id":266,"question":"在中国共产党成立98周年大会上，习近平总书记强调指出：“坚持不忘初心、继续前进，要坚持党的基本路线不动摇，不断把中国特色社会主义伟大事业推向前进。”改革开放以来，党和国家领导人一再强调要毫不动摇地坚持党的基本路线，这主要是因为，实践已经证明党的基本路线是（　）。","options":{"A":"思想路线的核心","B":"兴国、文国、强国的重大法宝","C":"实现科学发展的政治保证","D":"党和国家的生命线，人民的幸福线"},"answer":"BCD"},{"type":"multi","qid":"M267","id":267,"question":"“一带一路”倡议提出三年来，已经有100多个国家和国际组织参与其中，我国同沿线30多个国家签署共建合作协议、与20多个国家开展了国际产能合作，一批有影响的标志性项目逐步落地。截止2016年7月，我国对“一带一路”相关国家的投资累计已达511亿美元，占同期对外直接投资总额的12%，与沿线国家新签承包工程合同1.25万份，累计合同额2790亿美元。我国推进“一带一路”建设旨在（　）。","options":{"A":"统筹国内国际两个大局","B":"打造开放、包容、均衡、普惠的区域经济合作架构","C":"促进沿线各国共用繁荣","D":"探索国际合作及全球治理新模式"},"answer":"ABCD"},{"type":"multi","qid":"M268","id":268,"question":"党的十八届五中全会提出“创新、协调、绿色、开放、共享”的新发展理念，把创新作为引领发展的第一动力。在这一新发展理念的指导下，2016年5月党中央和国务院颁布了《国家创新驱动发展战略纲要》，把创新作为引领发展的第一动力是（　）。","options":{"A":"提高核心竞争力的必然选择","B":"构建和谐世界的内在要求","C":"引领经济发展新常态的根本之策","D":"分析世界发展历程和总结我国改革开放实践得出的结论"},"answer":"ACD"},{"type":"multi","qid":"M269","id":269,"question":"严肃党内政治生活是我们党的优良传统和政治优势，也是全面从严治党的基础，党的十八届六中全会通过了《关于新形势下党内政治生活的若干准则》和《中国共产党党内监督条例》，提出了新形势下加强和规范党内政治生活的新要求，其主要内容是（　）。","options":{"A":"着力维护党中央权威、保证党的团结统一、保持党的先进性和纯洁性","B":"着力增强党自我净化、自我完善、自我革新、自我提高能力","C":"着力提高党的领导水平和执政水平、增强拒腐防变和抵御风险能力","D":"着力增强政治生活的政治性、时代性、原则性、战斗性"},"answer":"ABCD"},{"type":"multi","qid":"M270","id":270,"question":"积极发展混合所有制经济，是完善我国基本经济制度的重要途径。2017年9月11日，我国首条由民营资本控股的高铁---杭绍台高铁项目在浙江杭州签约。该项目预计总投资超过400亿元，其中民营联合体占比51%，中国铁路总公司占比15%，各级地方政府合计占比34%。本项目坚持风险分担、利益共享原则，构建政府和社会资本都能接受的投资回报机制。这是我国发展混合所有制经济的一个典型案例。发展混合所有制经济有利于（）","options":{"A":"各种所有制资本取长补短、互相促进、共同发展","B":"各种所有制企业公平参与市场竞争","C":"发挥国有资本的带动力和影响力","D":"改善企业股权结构和公司治理结构"},"answer":"ABCD"},{"type":"multi","qid":"M271","id":271,"question":"维护河湖健康生命，实现河湖功能永续利用，需要进一步加强河湖管理保护工作，落实属地责任，健全长效机制。2016年11月28日，中共中央办公厅、国务院办公厅联合印发《关于全面推行河长制的意见》。2017年11月20日召开的中央全面深化改革领导小组会议审议通过了《关于在湖泊实施湖长制的指导意见》。全面推行河长制、湖长制是建设生态文明制度体系的重要举措。我国生态文明制度体系建设主要包括（）","options":{"A":"完善生态环境损害责任终身追究制度","B":"完善经济社会发展考核评价体系","C":"完善生态环境保护管理制度","D":"完善部门职责分散交叉的环保监督体系"},"answer":"ABC"},{"type":"multi","qid":"M272","id":272,"question":"党的十九大提出以党的政治建设为统领，全面推进党的政治建设、思想建设、组织建设、作风建设、纪律建设，把制度建设贯穿其中，并特别强调把党的政治建设摆在首位。之所以要把党的政治建设摆在首位，是因为（）","options":{"A":"坚定政治立场是党的根本宗旨","B":"政治属性是政党的第一属性","C":"政治建设是党的根本性建设，决定党的建设方向和效果","D":"旗帜鲜明讲政治是我们党作为马克思主义政党的根本要求"},"answer":"ABCD"},{"type":"multi","qid":"M273","id":273,"question":"全面提高对外开放水平，需要实施更为主动的开放战略。近年来，我国坚持引进来和走出去并重，全面开放进一步深化。据统计，2016年中国企业对外直接投资1832亿美元，连续两年位列世界第二；中国境外企业销售额1.5万亿美元，向所在国缴纳税费400亿美元，雇佣外方员工150万人；我国高技术服务业实际使用外资超过955亿元人民币，同比增长86%，在全球引资东道主中排名第三位，高附加值以及服务行业的外国直接投资流入量持续增长。这表明（）","options":{"A":"我国国际投资合作水平进一步提高","B":"我国防范经济风险和外部冲击的能力已经形成","C":"我国吸引外资的结构和质量正在不断优化","D":"我国对外直接投资已经完全转向高端"},"answer":"AC"},{"type":"multi","qid":"M274","id":274,"question":"中国特色社会主义进入新时代，我国社会主要矛盾已经转化为人民日益增长的美好生活需要和不平衡不充 分的发展之间的矛盾。但是，我国社会主要矛盾的变化没有改变我们对我国社会主义所处历史阶段的判断， 依据是( )","options":{"A":"我国总体上仍处于不发达阶段","B":"我国仍然面临极其复杂的国际环境","C":"我国仍然是世界上最大的发展中国家","D":"我国社会主要矛盾的变化只是社会主义初级阶段这个历史阶段中的变化"},"answer":"ACD"},{"type":"multi","qid":"M275","id":275,"question":"改革开放 40 年来，我国民营经济从小到大、从弱到强，不断发展壮大。截止 2017 年底，我国民营企业 数量超过 2700 万家，个体工商户超过 6500 万户，注册资本超过 165 万亿元。概括起来说，民营经济具有“五 六七八九”的特征，即贡献了 50%以上的税收，60%以上的国内生产总值，70%以上的技术创新成果，80%以 上的城镇劳动力就业，90%以上的企业数量。我国经济发展能够创造中国奇迹，民营经济功不可没。这表明， 民营经济已成为( )","options":{"A":"实现中华民族伟大复兴中国梦的重要力量","B":"推动社会主义市场经济发展的重要力量","C":"建设现代化经济体系的重要主体","D":"控制国民经济命脉的主导力量"},"answer":"ABC"},{"type":"multi","qid":"M276","id":276,"question":"国家治理体系是在党的领导下管理国家的制度体系，是一套紧密相连、相互协调的国家制度;国家治理能 力则是运用国家制度管理社会各方面事务的能力。二者的关系主要表现为( )","options":{"A":"国家治理体系和治理能力是相辅相成的有机整体","B":"好的国家治理体系可以提高国家治理能力","C":"提高国家治理能力可以充分发挥国家治理体系的效能","D":"国家治理体系越完备国家治理能力就一定越强"},"answer":"ABC"},{"type":"multi","qid":"M277","id":277,"question":"全面准确的理解和把握“一国”与“两制”的关系，应在坚持“一国”的基础上，实现“两制”之间的和 谐相处、相互促进。为此，必须做到( )","options":{"A":"把利用国际有利条件和发挥港澳优势有机结合起来","B":"把坚持“一国”原则和尊重“两制”差异有机结合起来","C":"把维护中央权力和保障特别行政区高度自治权有机结合起来","D":"把发挥祖国内地坚强后盾作用和提高港澳自身竞争力有机结合起来"},"answer":"BCD"},{"type":"multi","qid":"M278","id":278,"question":"坚定文化自信，是事关国运兴衰，事关文化安全、事关民族精神独立性的大问题。坚定中国特色社会主义 道路自信、理论自信、制度自信，说到底就是要坚定文化自信。讲文化自信，我们有充足的理由和充足底气， 因为中国特色社会主义文化( )","options":{"A":"源自于博大精深的中华优秀传统文化","B":"承继于激昂向上的革命文化","C":"熔铸于生机勃勃的社会主义先进文化","D":"植根于中国特色社会主义伟大实践"},"answer":"ABCD"},{"type":"multi","qid":"M279","id":279,"question":"中国特色社会主义进入新时代，人民群众的新期待内容更广泛，不仅关注“有没有”，更关注“好不好”；不仅包括既有的物质文化需求，更包括在此基础上衍生出来的获得感、幸福感、安全感及尊严、权利等新需求。这一变化表明(  )","options":{"A":"我国已满足人民“从有到优”的需求","B":"我国社会主要矛盾发生了历史性变化","C":"人民群众对日益增长的物质文化需要出现了阶段性新特征","D":"我国不平衡不充分的发展已成为制约满足人民需要的主要根源"},"answer":"BCD"},{"type":"multi","qid":"M280","id":280,"question":"止暴制乱、恢复秩序是香港当前最紧迫的任务。贯彻“一国两制”方针，绝不能允许触碰的原则底线是(  )","options":{"A":"危害国家主权安全","B":"干扰内地与香港的民间交流","C":"挑战中央权力与香港特别行政区基本法权威","D":"利用香港对内地进行渗透破坏"},"answer":"ACD"},{"type":"multi","qid":"M281","id":281,"question":"从 1956 年我国建立第一个自然保护区鼎湖保护区，到目前全国已拥有了 2750 个自然保护区，面积 147万平方公里，约占陆域国土面积 15%，自党的十八届三中全会决定“建立国家公园体制”以来，涉及 12 个省，总面积约为 22.29 万平方公里，我国建立以国家公园为主体的自然保护地体系的意义是(  )","options":{"A":"推进自然生态保护，建立美丽中国","B":"保护重要的自然生态系统和独特的自然遗产","C":"促进人与自然和谐共生","D":"维护国家生态安全"},"answer":"ABCD"},{"type":"multi","qid":"M282","id":282,"question":"党的政治建设的基本内容是（    ）","options":{"A":"保证全党服从中央","B":"坚持党中央权威","C":"坚持党中央的集中统一领导","D":"坚持理论联系实际"},"answer":"ABC"},{"type":"multi","qid":"M283","id":283,"question":"全面从严治党永远在路上，需要做到（     ）。","options":{"A":"加强党的思想建设，思想建设是党的基础性建设","B":"加强党的组织建设；持之以恒正风肃纪","C":"将制度建设贯穿到党的各项建设之中","D":"深化标本兼治，夺取反腐败斗争压倒性胜利"},"answer":"ABCD"},{"type":"multi","qid":"M284","id":284,"question":"（      ）是当前和今后一个时期国际局势发展的基本态势。","options":{"A":"总体和平、局部战争","B":"总体缓和、局部紧张","C":"总体稳定、局部动荡","D":"两极对立、和平演变"},"answer":"ABC"},{"type":"multi","qid":"M285","id":285,"question":"20世纪80年代末、90年代初，世界格局发生重大变化，这些变化可以概括为（       ）","options":{"A":"两极称霸的格局已经打破","B":"美国独霸世界的格局已形成","C":"新的世界格局尚未形成","D":"世界正处在新旧格局交替动荡时期"},"answer":"ABCD"},{"type":"multi","qid":"M286","id":286,"question":"（      ）是经济全球化的动力。","options":{"A":"科技革命","B":"生产力的发展","C":"冷战结束","D":"世贸组织的建立"},"answer":"ABD"},{"type":"multi","qid":"M287","id":287,"question":"20世纪80年代末90年代初，（      ）标志着两极格局终结。","options":{"A":"第三世界崛起","B":"美国经济衰落","C":"日本衰落","D":"苏东剧变"},"answer":"BD"},{"type":"multi","qid":"M288","id":288,"question":"中国共产党提出建立公正合理的国际政治经济新秩序的主张有（      ）","options":{"A":"政治上应相互尊重，共同协商","B":"经济上应相互促进，共同发展","C":"文化上应相互借鉴，共同繁荣","D":"安全上应相互信任，共同维护"},"answer":"ABCD"},{"type":"multi","qid":"M289","id":289,"question":"构建人类民运共同体思想的核心是建设（      ）的世界","options":{"A":"持久和平","B":"和平安全","C":"共同繁荣","D":"清洁美丽"},"answer":"ABCD"},{"type":"multi","qid":"M290","id":290,"question":"建设一带一路的原则有（      ）","options":{"A":"坚持引进来和走出去并重，","B":"深化双向投资合作","C":"坚持共商共建共享原则","D":"加强创新能力开放合作"},"answer":"ABCD"},{"type":"multi","qid":"M291","id":291,"question":"中国外交政策的宗旨是（       ）","options":{"A":"维护世界和平","B":"促进共同发展","C":"在国际舞台彰显中国力量","D":"为世界发展提供中国方案"},"answer":"AB"},{"type":"multi","qid":"M292","id":292,"question":"中国要求建立的新型国际关系，它的内涵是（    ）","options":{"A":"相互尊重","B":"公平正义","C":"合作双赢","D":"相互竞争"},"answer":"ABC"},{"type":"multi","qid":"M293","id":293,"question":"独立自主和平外交政策的基本内容有（      ）","options":{"A":"把国家主权和安全放在第一位，坚定地维护我国的国家利益，反对任何国家损害我国的独立、主权、安全和尊严；","B":"从我国人民和世界人民的根本利益出发，对于一切国际事务，都要根据事情本身的是非曲直决定自己的立场和政策，秉持公道，伸张正义，不屈从于任何外来压力；","C":"坚持各国的事务应由本国政府和人民决定，世界上的事情应由各国政府和人民平等协商，反对一切形式的霸权主义和强权政治；","D":"主张和平解决国际争端和热点问题，反对动辄诉诸武力或以武力相威胁，反对颠覆别国合法政权，反对一切形式的恐怖主义。"},"answer":"ABCD"},{"type":"multi","qid":"M294","id":294,"question":"（      ）是当前和今后一个时期国际局势发展的基本态势。","options":{"A":"总体和平、局部战争","B":"总体缓和、局部紧张","C":"总体稳定、局部动荡","D":"两极对立、和平演变"},"answer":"ABC"},{"type":"multi","qid":"M295","id":295,"question":"（      ）是经济全球化的根本动力。","options":{"A":"科技革命","B":"生产力的发展","C":"冷战结束","D":"世贸组织的建立"},"answer":"AB"},{"type":"multi","qid":"M296","id":296,"question":"当今影响世界和平的主要因素有（      ）","options":{"A":"苏东剧变","B":"霸权主义","C":"强权政治","D":"政治多极化"},"answer":"BC"},{"type":"multi","qid":"M297","id":297,"question":"影响世界多极化发展的主要因素（      ）","options":{"A":"美国搞单极世界","B":"英国脱离欧盟","C":"世界力量对比处在变化之中","D":"金砖五国崛起"},"answer":"AC"},{"type":"multi","qid":"M298","id":298,"question":"构建人类民运共同体思想，在政治上要求（      ）","options":{"A":"相互尊重","B":"平等协商","C":"摒弃冷战思维","D":"摒弃强权政治"},"answer":"ABCD"},{"type":"multi","qid":"M299","id":299,"question":"构建人类民运共同体思想，在安全上要求（      ）","options":{"A":"以对话解决争端","B":"以协商化解分歧","C":"统筹应对传统安全和非传统安全","D":"反对恐怖主义"},"answer":"ABCD"},{"type":"multi","qid":"M300","id":300,"question":"构建人类民运共同体思想，在经济上要求（      ）","options":{"A":"同舟共济","B":"推动经济全球化更加开放、包容、普惠、平衡、共赢","C":"在国际舞台彰显中国力量","D":"为世界发展提供中国方案"},"answer":"AB"},{"type":"multi","qid":"M301","id":301,"question":"构建人类民运共同体思想，在文化上要求（      ）","options":{"A":"尊重世界文明多样性","B":"以文明交流超越文明隔阂","C":"以文明互鉴超越文明冲突","D":"以文明优越消灭文明平庸"},"answer":"ABC"},{"type":"multi","qid":"M302","id":302,"question":"独立自主和平外交政策的基本内容有（      ）","options":{"A":"把国家主权和安全放在第一位，坚定地维护我国的国家利益，反对任何国家损害我国的独立、主权、安全和尊严；","B":"从我国人民和世界人民的根本利益出发，对于一切国际事务，都要根据事情本身的是非曲直决定自己的立场和政策，秉持公道，伸张正义，不屈从于任何外来压力；","C":"坚持各国的事务应由本国政府和人民决定，世界上的事情应由各国政府和人民平等协商，反对一切形式的霸权主义和强权政治；","D":"主张和平解决国际争端和热点问题，反对动辄诉诸武力或以武力相威胁，反对颠覆别国合法政权，反对一切形式的恐怖主义。"},"answer":"ABCD"},{"type":"multi","qid":"M303","id":303,"question":"中国共产党是（   ）。","options":{"A":"工人阶级的先锋队","B":"中国人民的先锋队","C":"中华民族的先锋队","D":"世界人民的先锋队"},"answer":"ABC"},{"type":"multi","qid":"M304","id":304,"question":"构建人类民运共同体思想，在生态上要求（      ）","options":{"A":"坚持环境友好","B":"合作应对气候变化","C":"征服自然改造自然","D":"坚持发展优先原则"},"answer":"AB"},{"type":"multi","qid":"M305","id":305,"question":"党的自身优势是中国特色社会主义制度优势的主要来源，党的自身优势是（    ）","options":{"A":"理论优势","B":"政治优势","C":"组织优势","D":"制度优势"},"answer":"ABCD"},{"type":"multi","qid":"M306","id":306,"question":"中国共产党在长期奋斗中形成了独特的政治优势是(     )","options":{"A":"严密组织体系","B":"严格组织生活","C":"严明组织纪律","D":"严厉惩罚条例"},"answer":"ABC"},{"type":"multi","qid":"M307","id":307,"question":"新时代中国共产党的历史使命包括（     ）","options":{"A":"统揽“四个伟大”","B":"全面建成社会主义现代化国家","C":"全面建成社会主义现代化强国","D":"实现中华民族伟大复兴的中国梦"},"answer":"ACD"},{"type":"multi","qid":"M308","id":308,"question":"中国共产党是世界上最大的政党，要领导13亿多人的社会主义大国，我们党既要政治过硬，也要本领高强：我们党需要增强（    ）","options":{"A":"学习本领和政治领导本领","B":"改革创新本领和科学发展本领","C":"依法执政本领和群众工作本领","D":"狠抓落实本领和驾驭风险本领"},"answer":"ABCD"},{"type":"multi","qid":"M309","id":309,"question":"中国共产党的领导决策机构是（     ）","options":{"A":"中央委员会","B":"中央纪律检查委员会","C":"中央政治局","D":"中央政治局常委会"},"answer":"ACD"},{"type":"multi","qid":"M310","id":310,"question":"党的领导是中国特色社会主义制度的最大优势，因为（     ）","options":{"A":"中国特色社会主义制度是党领导人民创建的","B":"党的领导地位和执政地位是与生俱来的","C":"党的自身优势是中国特色社会主义制度优势的主要来源","D":"党的领导是充分发挥中国特色社会主义制度优势的根本保障"},"answer":"ACD"},{"type":"multi","qid":"M311","id":311,"question":"党的十九大报告指出，中国特色社会主义进入新时代，我国社会的主要矛盾已经转化为人民日益增长的美好生活需要和不平衡不充分发展之间的矛盾。我国社会主要矛盾的变化没有改变（      ）","options":{"A":"我国仍处于并将长期处于社会主义初级阶段的基本国情","B":"世界最大发展中国家的国际地位","C":"我们对我国社会主义所处历史阶段的判断","D":"我们对我国发展所处历史方位的判断"},"answer":"ABC"},{"type":"multi","qid":"M312","id":312,"question":"党的十九大报告指出，经过长期努力，中国特色社会主义进入了新时代。中国特色社会主义进入新时代，意味着中国特色社会主义道路、理论、制度、文化不断发展，拓展了发展中国家走向现代化的途径，给世界上那些既希望加快发展又希望保持自身独立性的国家和民族提供了全新选择，为解决人类问题贡献了中国智慧和中国方案。中国特色社会主义进入新时代还意味着（      ）","options":{"A":"近代以来久经磨难的中华民族迎来了从站起来、富起来到强起来的伟大飞跃","B":"迎来了实现中华民族伟大复兴的光明前景","C":"科学社会主义在21世纪的中国焕发出强大生机活力","D":"在世界上高高华起了中国特色社会主义伟大旗帜"},"answer":"ABCD"},{"type":"multi","qid":"M313","id":313,"question":"我国社会主要矛盾的变化是关系全局的历史性变化，对党和国家工作提出了许多新要求。为了应对和解决好社会主要矛盾，我们需要（      ）","options":{"A":"大力提升发展质量和效益","B":"着力加快发展速度","C":"更好推动社会全面进步","D":"更好推动人的全面发展"},"answer":"ACD"},{"type":"multi","qid":"M314","id":314,"question":"当今世界正经历百年未有之大变局，这是以习近平同志为核心的党中央科学认识全球发展大势、深刻洞察世界格局变化而作出的重大战略判断。百年未有之大变局，主要表现为（      ）","options":{"A":"世界经济版图发生的深刻变化前所未有，新兴经济体和发达国家在世界经济中占据越来越大的份额，世界经济重心加快“自东向西”位移","B":"新一轮科技革命和产业变革带来的新陈代谢和激烈竞争前所未有，深刻改变人类社会生产生活方式和思维方式，推动生产关系变革","C":"国际力量对比发生的革命性变化前所未有，发达国家内部矛盾重重、实力相对下降，一大批发展中国家群体性崛起，成为影响国际政治经济格局的决定力量","D":"人类前途命运的休戚与共前所未有，各国相互联系和彼此依存比过去任何时候都更频繁、更紧密，整个世界日益成为你中有我、我中有你的人类命运共同体"},"answer":"BD"},{"type":"multi","qid":"M315","id":315,"question":"习近平新时代中国特色社会主义思想，充满着对马克思主义的坚定信仰，充满着对社会主义和共产主义的坚定信念。学习这一思想，既要全面准确领会其丰富内涵、思想体系和实践要求，又要深刻把握贯穿其中的马克思主义立场、观点和方法。习近平新时代中国特色社会主义思想的理论特质是（      ）","options":{"A":"秉持以人民为中心","B":"彰显历史自觉","C":"坚持实事求是","D":"突出问题导向"},"answer":"BCD"},{"type":"multi","qid":"M316","id":316,"question":"习总书记说，今日之中国，不仅是中国之中国，而且是亚洲之中国、世界之中国。未来之中国，必将以更加开放的姿态拥抱世界、以更有活力的文明成就贡献世界。习近平新时代中国特色社会主义思想围绕推动建立新型国际关系、构建人类命运共同体、建设更加美好的世界，提出了一系列富有创造性的理念和主张，致力于维护世界和平与安全。为实现世界和平与安全，这一思想倡导（      ）","options":{"A":"对话而不对抗、结伴而不结盟的国际交往观","B":"共同、综合、合作、可持续的新发展观","C":"构建相互尊重、公平正义、合作共赢的新型国际关系","D":"为维护世界和平和安全秩序贡献中国力量"},"answer":"ACD"},{"type":"multi","qid":"M317","id":317,"question":"列宁主义、毛泽东思想、以邓小平理论为首创成果和基本内容的中国特色社会主义理论之所以被成为“20世纪马克思主义”，就在于其研究对象分别是20世纪最伟大的社会主义样本既苏俄和中国。而习近平新时代中国特色社会主义思想被称为“21世纪马克思主义”的主要根据在于（      ）","options":{"A":"这一思想以我们正在做的事情为中心，着力破解难题、推进事业发展，以一系列新的重大理论观点，对马克思主义哲学、政治经济学、科学社会主义作出了原创性贡献","B":"为解决人类面临的共同难题提供了中国方案，为建设美好世界贡献了中国智慧","C":"创立了适合各自国情又兼具马克思主义原则的革命理论和建设理论","D":"旗帜鲜明坚持马克思主义，始终把马克思主义作为理论起点、逻辑起点、价值起点，鲜明贯穿着马克思主义立场、观点和方法"},"answer":"ABD"},{"type":"multi","qid":"M318","id":318,"question":"党的十九大报告指出，我国社会主要矛盾已经转化为人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾，这改变了1981年中共十一届六中全会通过的《中国共产党中央委员会关于建国以来党的若干历史问题的决议》对主要矛盾的论述。对于我国主要矛盾的论述发生变化的原因是（      ）","options":{"A":"我国社会生产力水平总体上显著提高","B":"人民美好生活需要日益广泛，不仅对物质文化生活提出了更高要求，而且在民主、法治、公平、正义、安全、环境等方面的要求日益增长","C":"我们对我国社会主义所处历史阶段有了新的判断","D":"我国仍处于并将长期处于社会主义初级阶段"},"answer":"AB"},{"type":"multi","qid":"M319","id":319,"question":"中华民族伟大复兴的中国梦，包含着丰富的思想内涵。其中最核心的内容包括（      ）","options":{"A":"国家富强","B":"民族振兴","C":"人民幸福","D":"社会和谐"},"answer":"ABC"},{"type":"multi","qid":"M320","id":320,"question":"中国梦的实现途径是（      ）","options":{"A":"坚持中国道路","B":"弘扬中国精神","C":"凝聚中国力量","D":"塑造中国形象"},"answer":"ABC"},{"type":"multi","qid":"M321","id":321,"question":"党的十九大报告明确指出，从2020年到21世纪中叶可以分为两个阶段来安排。第一个阶段，从2020年到2035年；第二个阶段，从2035年到21世纪中叶。其中，第二个阶段的奋斗目标是把我国建成富强民主文明和谐美丽的社会主义现代化强国，具体表现在（      ）","options":{"A":"实现国家治理体系和治理能力现代化","B":"成为综合国力和国际影响力领先的国家","C":"全体人民共同富裕完全实现，我国人民将享有更加幸福安康的生活","D":"我国物质文明、政治文明、精神文明、社会文明、生态文明将全面提升"},"answer":"ABD"},{"type":"multi","qid":"M322","id":322,"question":"一百年来，不管形势和任务如何变化，不管遇到什么样的惊涛骇浪，我们党都始终把握历史主动、锚定奋斗目标，沿着正确方向坚定前行。我们党团结带领人民用近30年时间完成了新民主主义革命，建立了新中国，中国人民从此站起来了；我们党团结带领人民在社会主义革命和建设的基础上用40多年时间进行改革开放。我们的下一步目标是（      ）","options":{"A":"如期打嬴脱贫攻坚战，区域性整体贫困得到解决","B":"在建党一百年时，全面建成小康社会","C":"到2035年，基本实现社会主义现代化","D":"到21世纪中叶，全面建成社会主义现代化强国"},"answer":"CD"},{"type":"multi","qid":"M323","id":323,"question":"2021年5月20日，中共中央、国务院印发《中共中央国务院关于支持浙江高质量发展建设共同富裕示范区的意见》，将浙江作为共同富裕示范区充分体现了党中央对解决我国发展不平衡不充分问题的坚定决心，为浙江高质量发展促进共同富裕提供强大动力和根本遵循。支持浙江高质量发展建设共同富裕示范区的意义在于（      ）","options":{"A":"有利于通过实践进一步丰富共同富裕的思想内涵","B":"有利于探索破解新时代社会主要矛盾的有效途径","C":"有利于为全国推动共同富裕提供省域范例","D":"有利于打造新时代全面展示中国特色社会主义制度优越性的重要窗口"},"answer":"ABCD"},{"type":"multi","qid":"M324","id":324,"question":"党的十九届五中全会提出，全面建成小康社会、实现第一个百年奋斗目标之后，我们要乘势而上开启全面建设社会主义现代化国家新征程、向第二个百年奋斗目标进军，这标志着我国进入了一个新发展阶段。新发展阶段是（      ）","options":{"A":"动态、积极有为、始终洋溢着蓬勃生机活力的过程","B":"自发、被动、自然而然就可以跨过的阶段","C":"社会主义初级阶段中的一个阶段","D":"不断发展进步、日益接近质的飞跃的量的积累和发展变化的过程"},"answer":"ACD"},{"type":"multi","qid":"M325","id":325,"question":"人类社会发展的历史表明，对一个民族、一个国家来说，最持久、最深层次的力量是全社会共同认可的核心价值观。面对世界范围思想文化交流交融交锋形势下价值观较量的新态势，面对改革开放和发展社会主义市场经济条件下思想意识多元多样多变的新特点，积极培育和践行社会主义核心价值观，有利于（      ）","options":{"A":"巩固马克思主义在意识形态领域的指导地位","B":"巩固全党全国人民团结奋斗的共同思想基础","C":"聚集实现中华民族伟大复兴中国梦的强大正能量","D":"促进人的全面发展和引领社会全面进步"},"answer":"ABCD"},{"type":"multi","qid":"M326","id":326,"question":"经过长期努力，中国特色社会主义进入了新时代，这是我国发展新的历史方位。中国特色社会主义进入新时代，意味着中国特色社会主义道路、理论、制度、文化不断发展，拓展了发展中国家走向现代化的途径，给世界上那些既希望加快发展又希望保持自身独立性的国家和民族提供了全新选择，为解决人类问题贡献了中国智慧和中国方案。中国特色社会主义进人新时代，还意味着（      ）","options":{"A":"近代以来久经磨难的中华民族迎来了从站起来、富起来到强起来的伟大飞跃","B":"迎来了实现中华民族伟大复兴的光明前景","C":"科学社会主义在21世纪的中国焕发出强大生机活力","D":"在世界上高高举起了中国特色社会主义伟大旗帜理论"},"answer":"ABCD"},{"type":"multi","qid":"M327","id":327,"question":"全面建成小康社会，要坚决打好精准脱贫攻坚战。坚持精准扶贫、精准脱贫的基本方略，就是要坚持“三位一体”大扶贫格局，主要包括（      ）","options":{"A":"行业扶贫","B":"专项扶贫","C":"经济扶贫","D":"社会扶贫"},"answer":"ABD"},{"type":"multi","qid":"M328","id":328,"question":"2017年1月，根据中共中央关于国家监察体制改革试点方案和全国人大常委会的决定，北京市、山西省、浙江省的人民代表大会分别产生监察委员会。新的监察委员会与党的纪律检查委员会合署办公，整合政府、检察等部门的监察力量，将人大、政府、法院、检察院及其他公共部门纳入监察范围。这一改革旨在（      ）","options":{"A":"实现对国家公职人员的监察全覆盖","B":"清除公共部门滋生腐败的社会土壤","C":"建立集中统一、权 威高效的监察体系","D":"搭建群众直接监督公共权力的新平台"},"answer":"AC"},{"type":"multi","qid":"M329","id":329,"question":"中共十八大以来，为了推进国家治理体系和治理能力现代化，实现国家长治久安，更好适应我国国家安全面临的新形势新任务，我们党明确提出了总体国家安全观。新时代我国面临复杂多变的安全和发展环境，各种可以预见和难以预见的风险因素明显增多，各方面风险可能不断积累甚至集中显露。这要求我们必须（      ）","options":{"A":"完善国家安全体系","B":"健全公共安全体系","C":"推进平安中国建设","D":"加强国家安全能力建设"},"answer":"ABCD"},{"type":"multi","qid":"M330","id":330,"question":"全面依法治国，总目标是建设中国特色社会主义法治体系，建设社会主义法治国家。总书记强调，这个总目标“既明确了全面推进依法治国的性质和方向，又突出了全面推进依法治国的工作重点和总抓手，对全面推进依法治国具有纲举目张的意义”，推进中国特色社会主义法治体系建设，就是要（      ）","options":{"A":"完善以宪法为核心的中国特色社会主义法律体系","B":"建立严密的法治监督体系","C":"进一步健全法治保障体系","D":"加强党内法规制度建设"},"answer":"ABCD"},{"type":"multi","qid":"M331","id":331,"question":"党的十八届五中全会顺应我国经济社会新发展和广大人民群众新期待，赋予“小康”更高的标准、更丰富的内涵，对全面建成小康社会进行了总体部署，规划和设计了未来美好生活的宏伟蓝图，体现了目标导向与问题导向相统一，体现了坚持战略性和操作性相结合。下列属于全面建成小康社会的目标要求的有（      ）","options":{"A":"经济保持中高速增长","B":"创新驱动成效显著","C":"发展协调性明显增强","D":"人民生活水平和质量普遍提高"},"answer":"ABCD"},{"type":"multi","qid":"M332","id":332,"question":"新的征程上，我们必须坚持党的（      ），统筹推进五位一体总体布局、协调推进四个全面战略布局，全面深化改革开放，立足新发展阶段，完整、准确、全面理念，构建新发展格局，推动高质量发展，推进科技自立自强，保证人民当家作主，坚持依法治国，坚持社会主义核心价值体系，坚持在发展中保障和改善人与自然和谐共生，协同推进人民富裕、国家强盛、中国美丽。","options":{"A":"基本理论","B":"基本路线","C":"基本方略","D":"基本道路"},"answer":"ABC"},{"type":"multi","qid":"M333","id":333,"question":"中共十九大报告指出，统筹推进“五位一体”总体布局，协调推进“四个全面”战略布局，提高党（      ）的能力和定力，确保党始终总揽全局、协调各方。","options":{"A":"把方向","B":"谋大局","C":"定政策","D":"促改革"},"answer":"ABCD"},{"type":"multi","qid":"M334","id":334,"question":"全党必须坚持党的基本理论、基本路线、基本方略，增强“四个意识”，坚定“四个自信”，做到“两个维护”，坚持系统观念，统筹推进“五位一体局，协调推进“四个全面”战略布局，立足新发展阶段、贯彻新发展理念、构建新发展格局、推动高质量发展，全面深化改革开放，促进共同富裕，推进科技发展全过程人民民主，保证人民当家作主，坚持全面依法治国，坚持社会主义核心价值体系，坚持在发展中保障和改善民生，坚持人与自然和谐共生，统筹全，加快国防和军队现代化，协同推进（   ）、（   ）、（   ）。","options":{"A":"人民富裕","B":"国家强盛","C":"中国美丽","D":"民族振兴"},"answer":"ABC"},{"type":"multi","qid":"M335","id":335,"question":"发展数字经济是把握新一轮科技革命和产业变革新机遇的战略选择。据2021年8月2日中国信息通信研究院发布的《全球数字经济白皮书》统计显示，2020年我国数字经济规模近5.4万亿美元，居世界第二位；同比增长9.6%，增速位于全球第一。我国数字经济健康发展有利于（）","options":{"A":"推动建设现代化经济体系","B":"推动构建新发展格局","C":"推动化解发展中的根本制约因素","D":"推动构筑国家竞争新优势"},"answer":"ABD"},{"type":"multi","qid":"M336","id":336,"question":"2021年是中国加入世界贸易组织20周年。20年来，中国经济总量从世界第六位上升到第二位，货物贸易从世界第六位上升到第一位，服务贸易从世界第十一位上升到第二位，利用外资稳居发展中国家首位，对外直接投资从世界第二十六位上升到第一位。目前，中国已成为50多个国家和地区的最大贸易伙伴、120多个国家和地区的前三大贸易伙伴。中国入世20年的历史充分证明（   ）","options":{"A":"我国经济已经实现了由高速增长向高质量发展转变","B":"以开放促改革、促发展是我国现代化建设的重要法宝","C":"坚持开放合作才能获得更多发展机遇和更大发展空间","D":"我国是多边贸易体制的坚定支持者、积极参与者和重要贡献者"},"answer":"BCD"},{"type":"multi","qid":"M337","id":337,"question":"党的十九大对深化国有企业改革提出了明确任务和新的更高要求。我们要切实增强“四个意识”，在思想上政治上行动上同以习近平同志为核心的党中央保持高度一致，以钉钉子精神扎实推进国有企业改革各项任务落地见效。新时代，深化国有企业改革的主要任务有（  ）","options":{"A":"完善各类国有资产管理体制","B":"发展混合所有制经济","C":"全面实施市场准人负面清单制度","D":"加强监管，有效防止国有资产流失"},"answer":"ABD"},{"type":"multi","qid":"M338","id":338,"question":"“要坚持‘两个毫不动摇’，把团结好、引导好民营经济人士作为一项重要任务。” 习近平同志反复强调民营经济统战工作在党和国家工作全局中的重要意义，是因为民营经济（  ）","options":{"A":"己经成为推动我国发展不可或缺的力量","B":"在推动我国经济发展中发挥着主导作用","C":"是我国经济制度的内在要素","D":"是建设现代化经济体系的重要主体"},"answer":"ACD"},{"type":"multi","qid":"M339","id":339,"question":"中国共产党自成立以来不断探索和发展适合中国国情的民主道路，使人民民主在东方大国落地生根、繁荣发展。党的十八大以来，我们党不断深化对民主政治发展规律的认识，践行以人民为中心的发展思想，积极发展全过程人民民主。全过程人民民主（    ）","options":{"A":"是完整制度程序和完整参与实践有机统一的民主","B":"是全链条、全方位、全覆盖的民主","C":"是最广泛、最真实，最管用的社会主义民主","D":"实现了过程民主和成果民主、程序民主和实质民主、直接民主和间接民主、人民民主和国家意志相统一"},"answer":"ABCD"},{"type":"multi","qid":"M340","id":340,"question":"党的十九大对深化国有企业改革提出了明确任务和新的更高要求。我们要切实增强“四个意识”，在思想上政治上行动上同以习近平同志为核心的党中央保持高度一致，以钉钉子精神扎实推进国有企业改革各项任务落地见效。新时代，深化国有企业改革的主要任务有（  ）","options":{"A":"完善各类国有资产管理体制","B":"发展混合所有制经济","C":"全面实施市场准人负面清单制度","D":"加强监管，有效防止国有资产流失"},"answer":"ABD"},{"type":"multi","qid":"M341","id":341,"question":"2020年7月22日，全国人大常委会机关党组理论学习中心组召开集体学习扩大会议，专题学习《习近平谈治国理政》第三卷并开展交流研讨，持续加强对习近平关于坚持和完善人民代表大会制度的重要思想的学习、研究和宣传。我们必须要坚持人民代表大会制度是因为它是（  ）","options":{"A":"社会主义民主政治建设的基础","B":"实现中华民族伟大复兴的制度保障","C":"符合中国国情和实际的制度","D":"人民当家作主的根本制度保障"},"answer":"BCD"},{"type":"multi","qid":"M342","id":342,"question":"习近平指出，在革命、建设、改革各个历史时期，我们党始终把统一战线和统战工作摆在全党工作的重要位置，努力团结一切可以团结的力量、调动一切可以调动的积极因素，为党和人民事业不断发展营造了十分有利的条件。新时期，爱国统一战线的主体和基础包括（ ）","options":{"A":"社会主义事业的建设者","B":"拥护社会主义的爱国者","C":"全体社会主义劳动者","D":"台湾同胞、港澳同胞和海外侨胞"},"answer":"ABC"},{"type":"multi","qid":"M343","id":343,"question":"十三五”时期，我国大气污染治理取得明显成效。来自生态环境部的数据显示，与2015年相比，2019年细颗粒物(PM2.5)未达标地级及以上城市年均浓度下降23.1%，全国337个地级及以上城市年均优良天数比例达到82%。2020年1月至8月，这一比例达到86.7%，PM2.5浓度为31微克/立方米，同比下降11.4%，蓝天白云的好天气正在成为常态。我国大气污染治理取得明显成效，主要得益于","options":{"A":"坚持全民共治，源头防治","B":"把突出环境问题作为生态文明建设的着力点","C":"构建生态廊道和生物多样性保护网络","D":"不断完善生态环境保护制度和强化环保督察"},"answer":"ABCD"},{"type":"multi","qid":"M344","id":344,"question":"建设美丽中国”，承载着一代又一代中国共产党人对中国未来发展的美好愿景，承续着“青春中国”“可爱中国”“新中国”“富强民主文明和谐中国”的中国梦。“建设美丽中国”必须大力推进生态文明建设。我国生态文明建设的方向和重点是","options":{"A":"在环保工作中，把预防为主、源头治理放在首位","B":"在环保工作中，把尊重自然放在首位","C":"在生态系统保护和修复中，把人工修复生态系统放在首位","D":"在生态系统保护和修复中，把利用自然力修复生态系统放在首位"},"answer":"AD"},{"type":"multi","qid":"M345","id":345,"question":"坚持人与自然和谐共生，要做到","options":{"A":"尊重自然","B":"顺应自然","C":"保护自然","D":"利用自然"},"answer":"ABC"},{"type":"multi","qid":"M346","id":346,"question":"维护河湖健康生命，实现河湖功能永续利用，需要进一步加强河湖管理保护工作，落实属地责任，健全长效机制。2016年11月28日，中共中央办公厅、国务院办公厅联合印发《关于全面推行河长制的意见》，2017年11月20日召开的中央全面深化改革领导小组会议审议通过了《关于在湖泊实施湖长制的指导意见》，全面推行河长制、湖长制是建设生态文明制度体系的重要举措。我国生态文明制度体系建设主要包括","options":{"A":"完善经济社会发展考核评价体系","B":"完善生态环境损害责任终身追究制度","C":"完善生态环境保护管理制度","D":"完善各部门职责分散交叉的环保监督体系"},"answer":"ABC"},{"type":"multi","qid":"M347","id":347,"question":"2013年9月7日，国家主席习近平在哈萨克斯坦纳扎尔巴耶夫大学发表演讲并回答学生提问时说，“我们既要绿水青山，也要金山银山。宁要绿水青山，不要金山银山，而且绿水青山就是金山银山。”这段话生动地反映了生态文明建设与经济建设之间的关系，即","options":{"A":"生态文明建设可以取代经济建设","B":"生态文明建设应与经济建设协同发展","C":"生态环境是经济发展的重要基础","D":"生态优势可以转化为经济优势"},"answer":"BCD"},{"type":"multi","qid":"M348","id":348,"question":"从1956年我国建立第一个自然保护区鼎湖山保护区，到目前全国已拥有2750个自然保护区，面积147万平方公里，约占陆域国土面积的15%。自党的十八届三中全会决定“建立国家公园体制”以来，国家公园体制试点快速推进，目前全国共有10处国家公园体制试点单位，涉及12个省，总面积约22.29万平方公里。我国建立以国家公园为主体的自然保护地体系的意义是","options":{"A":"推进自然生态保护、建设美丽中国","B":"保护重要的自然生态系统和独特的自然遗产","C":"促进人与自然和谐共生","D":"维护国家生态安全"},"answer":"ABCD"},{"type":"multi","qid":"M349","id":349,"question":"加快生态文明体制改革，要做到","options":{"A":"推动形成绿色发展方式和生活方式","B":"着力解决突出环境问题","C":"加大生态系统保护力度","D":"改革生态环境监管体制"},"answer":"ABCD"},{"type":"multi","qid":"M350","id":350,"question":"坚持马克思主义在意识形态领域指导地位的根本制度，是因为意识形态关乎（），决定文化前进方向道路。","options":{"A":"旗帜","B":"道路","C":"国家安全","D":"价值取向"},"answer":"ABC"},{"type":"multi","qid":"M351","id":351,"question":"坚持马克思主义在意识形态领域指导地位的根本制度,需要（   ）。","options":{"A":"把马克思主义指导地位贯穿到文化建设各方面","B":"实施马克思主义理论研究和建设工程","C":"加强和改进学校思想政治教育","D":"落实意识形态工作责任制"},"answer":"ABCD"},{"type":"multi","qid":"M352","id":352,"question":"坚持马克思主义在意识形态领域指导地位的根本制度,体现了（   ）的必然要求。","options":{"A":"恪守党的本质属性、巩固党的团结统一","B":"坚持正确发展道路、实现国家长治久安","C":"筑牢全体人民共同思想基础、凝聚团结奋进强大精神力量","D":"保证我国文化建设正确方向、更好担负起新时代使命任务"},"answer":"ABCD"},{"type":"multi","qid":"M353","id":353,"question":"社会主义核心价值观把涉及国家、社会、公民三个层面的价值要求融为一体，深入回答了我们（   ）的重大问题。","options":{"A":"要建设什么样的国家","B":"建设什么样的社会","C":"培育什么样的公民","D":"体现什么样的精神"},"answer":"ABC"},{"type":"multi","qid":"M354","id":354,"question":"社会主义核心价值观“富强、民主、文明、和谐，自由、民主、公正、法治，爱国、敬业、诚信、友善”的24字表达（       ）。","options":{"A":"把涉及国家、公民、社会三个层面的价值要求融为一体，既体现了社会主义本质要求，继承了中华优秀传统文化，也吸收了世界文明有益成果，体现了时代精神","B":"回答了我们要建设什么样的国家、建设什么样的社会、培育什么样的公民的重大问题，是当代中国精神的集中体现，凝结着全体人民共同的价值追求","C":"是在社会主义核心价值体系基础上提出来的，体现着社会主义核心价值体系的根本性质和基本特征，反映着社会主义核心价值体系的丰富内涵和实践要求","D":"是对我国社会主义核心价值体系的有益补充，是对西方国家资本主义核心价值观的整体超越"},"answer":"ABC"}
